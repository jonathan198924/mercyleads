"A1":{q:"Pekerja lebih masa atau permit tamat",s:["Kira bilangan hari tepat dari tarikh tamat pas sehingga hari ini.","1-30 hari: bayar kompaun RM 30/hari di pejabat Imigresen terdekat. Bawa pasport dan surat majikan.","31-60 hari: bayar kompaun rata RM 1,000 di pejabat Imigresen.","61-90 hari: bayar kompaun rata RM 2,000 di pejabat Imigresen.","Lebih 90 hari: serah diri secara sukarela kepada Bahagian Penguatkuasaan Imigresen.","Mohon Pas Khas (RM 100-200) pada hari yang sama."],cost:"Kompaun: RM 30/hari (1-30h) | RM 1,000 rata (31-60h) | RM 2,000 rata (61-90h). Pas Khas: RM 100-200.",warn:"Lebih 90 hari: Bahagian Penguatkuasaan — risiko tahanan, pendakwaan, deportasi, senarai hitam.",pitch:"Perkhidmatan pembaharuan VP(TE) Mercy Skills bermula 90 hari sebelum tamat. Ini tidak akan berlaku apabila anda menggunakan kami."},
"A2":{q:"Cara mengambil pekerja asing secara sah",s:["Dapatkan kelulusan Seksyen 60K melalui ePPAx di eppax.gov.my — wajib dahulu.","Siarkan kekosongan di MYFutureJobs sekurang-kurangnya 30 hari.","Mohon kuota di Pusat Setempat (OSC), Kementerian Hal Ehwal Dalam Negeri.","Lantik agensi berlesen JTKSM — sahkan di jtksm.gov.my.","Agensi hantar VDR melalui ePPAx dan bayar levi. Pekerja masuk Malaysia, FOMEMA dalam 30 hari.","VP(TE) dan i-Kad dikeluarkan selepas lulus FOMEMA."],cost:"Levi: RM 1,850/tahun (pembuatan/perkhidmatan) | RM 640/tahun (perladangan). Mercy Skills: sebut harga per kes.",warn:"Mengupah melalui orang tengah tidak berlesen — majikan bertanggungjawab penuh. Denda RM 5,000-30,000 setiap pekerja.",pitch:"Mercy Skills JTKSM 928 menguruskan keseluruhan proses. Anda lulus pekerja, kami hantar."},
"A3":{q:"Majikan ditangkap dengan pekerja haram atau serangan",s:["Hentikan semua pekerja haram serta-merta.","Jalankan semakan e-Patuh di app1.imi.gov.my/e-patuh.","Laporkan secara sukarela kepada SISPAA — dilayan lebih baik.","Hubungi Mercy Skills untuk memulakan proses penggantian yang sah.","Maklumkan JTKSM dalam masa 14 hari dari sebarang pengambilan pekerja baru."],cost:"Denda: RM 5,000-30,000 setiap pekerja. Kesalahan kedua: minimum RM 10,000.",warn:"347 majikan didenda RM 5.98 juta pada Jan-Feb 2026. Kejahilan BUKAN pembelaan.",pitch:"Apabila anda menggunakan Mercy Skills, setiap pekerja disahkan e-Patuh. Ini tidak boleh berlaku."},
"A4":{q:"Pembaharuan permit — VP(TE) atau EP hampir tamat",s:["Mulakan sekarang jika tamat tempoh dalam 90 hari.","VP(TE): hantar pembaharuan melalui ePPAx. Atur FOMEMA (RM 180-250).","Bayar levi: RM 1,850 (pembuatan) atau RM 640 (perladangan).","EP: hantar melalui Xpats Gateway. Bayar RM 2,160. Benarkan 6-8 minggu.","Atau hubungi Mercy Skills — kami uruskan segalanya dari RM 400 setiap pekerja."],cost:"Pembaharuan Mercy Skills: RM 400-600 setiap pekerja. Pembantu: RM 1,500-2,500.",warn:"Pembaharuan lewat bermakna pekerja haram pada tarikh tamat. Denda RM 5,000-30,000 setiap pekerja.",pitch:"Mercy Skills hantar peringatan 90 hari sebelum tamat dan uruskan semua kertas kerja pembaharuan."},
"A5":{q:"Ingin mengambil pembantu rumah atau pembantu asing",s:["Majikan: Warganegara Malaysia/PR/EP Kat I atau II, berumur 21+, pendapatan isi rumah minimum RM 3,000-7,000.","Dapatkan kelulusan pra-JTKSM melalui ePPAx — wajib mulai 2025.","Negara sumber: Indonesia, Filipina, Kemboja, Sri Lanka, Nepal, India, Vietnam, Thailand, Laos.","Hubungi Mercy Skills — kami cari, saring, proses semua dokumen dan hantar.","PRA masuk Malaysia. Majikan terima di titik masuk. FOMEMA dalam 30 hari.","Majikan Islam mesti mengambil PRA Islam sahaja. Satu PRA sahaja setiap isi rumah."],cost:"Indonesia: RM 12,000-15,000 all-in. Filipina: RM 16,000-18,000. Levi: DIKECUALIKAN. Gaji min: Indonesia RM 1,500/bln, Filipina RM 1,800/bln.",warn:"Gunakan agensi berlesen JTKSM sahaja. Ejen tidak berlesen adalah punca penipuan terbesar.",pitch:"Penempatan pembantu rumah penuh Mercy Skills dari RM 12,000. Waranti abscondment 3-6 bulan."},
"A6":{q:"Pembantu rumah lari atau abscond",s:["Buat laporan polis dalam masa 24 jam.","Dapatkan Borang Laporan Pekerja Asing (Melarikan Diri) di mana-mana pejabat Imigresen.","Laporkan melalui ePPAx untuk batalkan PL(KS) dan hentikan caj levi.","Bon peribadi dilucuthak jika TIDAK dilaporkan dengan betul.","Semak kontrak Mercy Skills untuk waranti abscondment (3-6 bulan)."],cost:"Bon peribadi dilucuthak jika tidak dilaporkan. Penggantian tertakluk pada bayaran baru.",warn:"Mesti laporkan dalam 24 jam. PRA yang lari disenarai hitam.",pitch:"Kontrak Mercy Skills termasuk waranti abscondment 3-6 bulan."},
"A7":{q:"Gaji pekerja atau pembantu tidak dibayar atau lewat",s:["Kumpul bukti: penyata bank, slip gaji, kontrak, eksport WhatsApp.","Hantar Surat Tuntutan rasmi melalui Pos Berdaftar — nyatakan amaun dan tarikh akhir 7 hari.","Failkan aduan melalui aplikasi eAduan JTKSM atau jtksm.gov.my/complaints.","Pergi ke pejabat JTKSM terdekat dengan semua dokumen asal.","JTKSM buat pengantaraan. Mahkamah Buruh Seksyen 69 EA — sehingga RM 50,000, tanpa peguam."],cost:"Aduan JTKSM: PERCUMA. Mahkamah Buruh: PERCUMA.",warn:"Failkan dalam 60 hari dari tarikh pelanggaran. Simpan semua bukti digital.",pitch:"Ahli MyShield (RM 20/bulan) mendapat bantuan pegawai segera."},
"A8":{q:"Majikan menahan atau merampas pasport pekerja",s:["Kesalahan jenayah di bawah Seksyen 12(1)(f) Akta Pasport 1966.","Pekerja buat laporan polis DAN laporan berasingan kepada Imigresen serentak.","Hubungi JTKSM 03-8000 8000 dan TIP 15000.","Perlindungan ATIPSOM terpakai — pekerja tidak boleh didakwa semasa membuat laporan.","Majikan menghadapi denda sehingga RM 10,000 atau penjara 5 tahun."],cost:"Tiada kos untuk melapor.",warn:"Pekerja simpan pasport sendiri pada SETIAP MASA. Tiada pengecualian.",pitch:"Semua kontrak penempatan Mercy Skills termasuk klausa simpan pasport wajib."},
"A9":{q:"Permohonan Pas Pekerjaan (EP) untuk ekspatriat",s:["Majikan daftar di portal ESD: esd.imi.gov.my.","Mohon kelulusan jawatan Ekspatriat. Dapatkan CGC dari negara asal — benarkan masa tambahan 2-4 minggu.","Hantar melalui Xpats Gateway: pasport, ijazah, kontrak, dokumen syarikat, CGC.","Bayar RM 2,160. Pemprosesan: 6-8 minggu (Kat I/II), 8-12 minggu (Kat III).","VDR dikeluarkan. Pekerja masuk Malaysia. EP diendos pada pasport."],cost:"Yuran kerajaan: RM 2,160. Mercy Skills: Kat I RM 3,000-5,000 | Kat II RM 2,000-3,500 | Kat III RM 1,500-2,500.",warn:"CGC wajib mulai 2026. Kat I: RM 10K+/bln. Kat II: RM 5K-9,999. Kat III: RM 3K-4,999.",pitch:"Mercy Skills menguruskan pendaftaran ESD dan permohonan EP penuh."},
"A10":{q:"Agensi pembantu penipu atau tiada bayaran balik",s:["Kumpul bukti: kontrak, resit pembayaran, eksport WhatsApp.","Hantar Surat Tuntutan melalui Pos Berdaftar — nyatakan pelanggaran dan tarikh akhir 7 hari.","Failkan eAduan JTKSM — mengancam pembaharuan lesen agensi.","Failkan di TTPM (ttpm.gov.my) serentak — tuntutan sehingga RM 50,000, bayaran RM 5."],cost:"Failkan TTPM: RM 5 sahaja. Boleh mendapatkan semula sehingga RM 50,000.",warn:"Failkan KEDUA-DUA JTKSM dan TTPM pada masa yang sama untuk hasil terpantas.",pitch:"Mercy Skills berlesen JTKSM 928. Perjanjian bertulis sebelum sebarang kerja dimulakan."},
"A11":{q:"Pembantu rumah didera oleh majikan",s:["PRA pergi ke balai polis terdekat — BUKAN agensi dan BUKAN Imigresen dahulu.","Buat laporan polis dan dapatkan nombor laporan.","Hubungi kedutaan: Indonesia 03-4253 2100 atau Filipina 03-2148 4233.","Hubungi JTKSM 03-8000 8000 untuk perintah perlindungan kecemasan.","Jika pasport juga ditahan: failkan aduan Akta Pasport berasingan di Imigresen."],cost:"Tiada kos untuk melapor.",warn:"Jangan nasihatkan PRA kembali ke majikan semasa aduan aktif.",pitch:"Ini sebab MyShield wujud — RM 20/bulan, pegawai khusus on call 24/7."},
"A12":{q:"Pemerdagangan manusia atau buruh paksa",s:["Hubungi Talian TIP 15000 segera — 24 jam, tanpa nama, pelbagai bahasa.","Perlindungan ATIPSOM: mangsa TIDAK BOLEH didakwa atas kesalahan imigresen akibat pemerdagangan.","Lapor kepada JTKSM (03-8000 8000) dan Polis (999) serentak.","Petanda: pasport ditahan, gaji ditahan, pergerakan terhad, hutang buruh."],cost:"Tiada kos. Pemerdagang: 3-20 tahun penjara.",warn:"Mangsa dilindungi sepenuhnya. Imuniti ATIPSOM terpakai semasa membuat laporan.",pitch:"Semua penempatan Mercy Skills termasuk klausa simpan pasport dan gaji melalui bank wajib."},
"A13":{q:"Pekerja mahu tukar majikan",s:["VP(TE): majikan semasa mohon Tukar Majikan melalui ePPAx. Pemindahan antara sektor dibenarkan sejak 2025.","JANGAN mulakan kerja di majikan baru sehingga VP(TE) baru dikeluarkan.","EP: EP semasa dibatalkan dahulu. Majikan baru mohon EP baru (RM 2,160).","Syarikat tutup: mohon Pas Khas (RM 100-200) di Imigresen, kemudian Tukar Majikan melalui ePPAx."],cost:"Tukar Majikan: kadar levi standard. Pas Khas: RM 100-200.",warn:"Bekerja di majikan baru sebelum pas baru dikeluarkan adalah jenayah.",pitch:"Mercy Skills menguruskan Tukar Majikan melalui ePPAx — pekerja kekal sah sepanjang peralihan."},
"A14":{q:"Peraturan kerja sambilan pas pelajar",s:["Hanya pelajar UA atau IPTS — pelajar Pusat Bahasa tidak boleh bekerja.","Bekerja hanya semasa cuti semester atau cuti umum melebihi 7 hari berturut-turut.","4 sektor sahaja: (1) Restoran — pelayan/dapur, BUKAN juruwang. (2) Hotel — perkhidmatan umum, BUKAN penyanyi/tukang urut/GRO. (3) Stesen Minyak. (4) Pasar Mini. Maksimum 20 jam/minggu.","Mohon: surat tawaran kerja, hantar ke pejabat antarabangsa universiti, pelajar DAN wakil universiti hadir di Imigresen bersama, tunggu kelulusan bertulis, baru mulakan kerja."],cost:"Kelulusan kerja sambilan: PERCUMA. Pas pelajar: RM 60/tahun.",warn:"Bekerja semasa semester aktif adalah haram. Kerja gig TIDAK dilindungi.",pitch:"Keahlian pelajar MyWakil RM 10/bulan — pegawai khusus bantu dengan hak pekerjaan."},
"A15":{q:"Cara membuat aduan — panduan umum",s:["Kesalahan imigresen: SISPAA di imi.spab.gov.my atau 03-8000 8000.","Pertikaian buruh: aplikasi eAduan JTKSM atau jtksm.gov.my.","Pemerdagangan: TIP 15000 — 24 jam, tanpa nama.","Pegawai rasuah: SPRM 1-800-88-6000.","Pelanggaran agensi: TTPM ttpm.gov.my — RM 5, sehingga RM 50,000.","Kecemasan: Polis 999."],cost:"Semua PERCUMA kecuali TTPM (RM 5).",warn:"Laporan sukarela sentiasa menghasilkan layanan yang lebih baik.",pitch:"Pelanggan Mercy Skills mendapat panduan langsung tentang saluran yang perlu digunakan."},
"F1":{q:"Saya ada pekerja tapi tiada permit — boleh buat permit sekarang?",honest:"Ya, anda boleh mohon VP(TE) — TETAPI hanya jika pekerja masuk Malaysia secara sah melalui titik masuk rasmi. Pekerja yang masuk secara haram TIDAK BOLEH disahkan dan mesti pulang ke negara asal dahulu.",s:["Semak: adakah pekerja masuk melalui titik masuk rasmi (KLIA, CIQ JB, sempadan darat rasmi)?","Mohon Pas Khas (RM 100-200 setiap pekerja) di Imigresen jika masuk secara sah.","Majikan mohon kelulusan Seksyen 60K melalui ePPAx.","Siar di MYFutureJobs 30 hari, kemudian mohon kuota di OSC.","Hubungi Mercy Skills (JTKSM 928) untuk uruskan VDR, FOMEMA, levi dan VP(TE).","Pekerja yang masuk secara haram: mesti keluar Malaysia melalui COM, pulang ke negara asal, kemudian masuk semula melalui proses VDR yang betul."],cost:"Pas Khas: RM 100-200 setiap pekerja. Levi: RM 1,850/tahun. Mercy Skills: sebut harga per kes.",warn:"Pekerja tanpa pas sah mendedahkan majikan kepada denda RM 5,000-30,000 setiap pekerja.",pitch:"Mercy Skills menguruskan situasi ini — dari Pas Khas hingga VP(TE) penuh. Hubungi kami hari ini."},
"F2":{q:"Permit pekerja saya dah tamat 2 bulan — apa yang berlaku pada saya?",honest:"Pekerja anda telah menjadi haram selama 2 bulan. Anda terdedah kepada denda RM 5,000-30,000 setiap pekerja. Bertindak segera.",s:["Hentikan pekerja dari bekerja serta-merta.","Jalankan semakan e-Patuh pada setiap pekerja.","Pekerja bayar kompaun lebih masa: 31-60 hari = RM 1,000 rata setiap pekerja.","Mohon Pas Khas (RM 100-200) untuk setiap pekerja semasa pembaharuan diproses.","Hantar pembaharuan melalui ePPAx segera. Atur pemeriksaan FOMEMA.","Pertimbangkan pendedahan sukarela kepada Imigresen — lebih baik daripada ditangkap.","Hubungi Mercy Skills untuk menguruskan proses pembaharuan segera."],cost:"Kompaun lebih masa: RM 1,000 setiap pekerja (31-60 hari). Pas Khas: RM 100-200. Pembaharuan: RM 400-600.",warn:"Setiap hari tambahan meningkatkan pendedahan undang-undang anda. Jangan bertangguh.",pitch:"Mercy Skills menguruskan pembaharuan permit segera. Kami boleh mula dalam 24 jam."},
"F3":{q:"Mengambil pekerja melalui ejen tetapi tiada i-Kad atau dokumen",honest:"Ini situasi serius. Jika ejen tidak berlesen, pekerja berkemungkinan tiada status imigresen yang sah. Majikan bertanggungjawab penuh di bawah Seksyen 55E.",s:["Semak setiap pekerja di e-Patuh menggunakan nombor pasport mereka.","Jika e-Patuh tiada rekod — pekerja tiada status sah. Hentikan kerja serta-merta.","Laporkan kepada SISPAA secara sukarela.","Failkan aduan terhadap ejen tidak berlesen di JTKSM.","Pekerja yang masuk secara sah: mohon Pas Khas dan mulakan proses VP(TE) melalui Mercy Skills.","Pekerja tanpa dokumen: hubungi Penguatkuasa Imigresen untuk serah diri sukarela.","Seterusnya: sentiasa sahkan lesen JTKSM ejen sebelum membayar deposit."],cost:"Denda berpotensi: RM 5,000-30,000 setiap pekerja.",warn:"Ejen tidak berlesen adalah punca nombor satu situasi ini di Malaysia.",pitch:"Mercy Skills berlesen JTKSM 928. Perjanjian bertulis dan dokumentasi disahkan untuk setiap pekerja."},
"F4":{q:"Pekerja saya bekerja di kilang saya tapi permit di bawah syarikat lain",honest:"Ini adalah pelanggaran jenayah syarat VP(TE). Pas pekerja terikat kepada majikan yang tertera padanya. Kedua-dua pekerja dan syarikat anda bertanggungjawab.",s:["Hentikan pekerja dari bekerja di premis anda serta-merta.","Majikan yang tertera pada VP(TE) mesti mohon Tukar Majikan melalui ePPAx.","Pemindahan antara sektor dibenarkan sejak 2025.","Pekerja TIDAK BOLEH bekerja semula sehingga VP(TE) baru dengan nama syarikat anda dikeluarkan.","Hubungi Mercy Skills untuk menguruskan permohonan Tukar Majikan."],cost:"Tukar Majikan: kadar levi standard. Pemprosesan: 2-4 minggu.",warn:"Membenarkan pekerja terus bekerja di bawah nama syarikat lain mendedahkan kedua-dua syarikat kepada pendakwaan.",pitch:"Mercy Skills menguruskan Tukar Majikan melalui ePPAx — pekerja kekal sah sepanjang peralihan."},
"F5":{q:"Pekerja asing saya meninggal di tempat kerja — apa yang perlu saya lakukan?",honest:"Ini adalah kematian di tempat kerja. Anda mempunyai kewajipan undang-undang segera di bawah PERKESO, Akta Pekerjaan, dan Akta Imigresen.",s:["Hubungi polis (999) dan ambulans serta-merta.","Laporkan kepada PERKESO dalam masa 48 jam di perkeso.gov.my atau hubungi 1-300-22-8000.","Laporkan kematian kepada Jabatan Imigresen untuk membatalkan VP(TE) dan i-Kad.","Maklumkan kedutaan pekerja dan bantu dengan pemulangan jenazah — majikan menanggung kos.","Laporkan kepada DOSH dalam 7 hari.","Hubungi Mercy Skills untuk bantuan semua dokumentasi."],cost:"Pemulangan jenazah: RM 3,000-8,000.",warn:"Kegagalan melaporkan kepada DOSH dalam 7 hari membawa denda di bawah Akta OSH 1994.",pitch:"Mercy Skills membantu dengan dokumentasi, pembatalan Imigresen, dan penyelarasan kedutaan."},
"F6":{q:"Pekerja saya gagal pemeriksaan FOMEMA — apa yang berlaku?",honest:"Pekerja yang gagal FOMEMA mesti dipulangkan. Tiada VP(TE) atau i-Kad akan dikeluarkan. Majikan mesti atur dan bayar untuk pekerja pulang ke negara asal.",s:["Dapatkan notis kegagalan FOMEMA dari klinik.","Mohon Memo Daftar Keluar (COM) di Jabatan Imigresen serta-merta.","Beli tiket penerbangan pulang — majikan menanggung kos.","Pekerja keluar Malaysia menggunakan COM.","Hubungi Mercy Skills untuk penggantian — kontrak termasuk klausa penggantian kegagalan FOMEMA."],cost:"Penerbangan pulang: RM 500-1,500. Penggantian: tertakluk pada terma agensi.",warn:"Menahan pekerja yang gagal FOMEMA atau membiarkan mereka bekerja adalah kesalahan imigresen serius.",pitch:"Kontrak Mercy Skills termasuk penggantian kegagalan FOMEMA tanpa yuran agensi tambahan dalam tempoh waranti."},
"F7":{q:"Saya ingin kurangkan pekerja asing — bagaimana hantar mereka pulang?",honest:"Anda boleh memulangkan pekerja secara sah, tetapi ada prosedur yang betul. Penamatan yang tidak betul mendedahkan anda kepada tuntutan Akta Pekerjaan.",s:["Berikan notis yang betul mengikut kontrak — minimum 4 minggu atau bayaran ganti.","Mohon Memo Daftar Keluar (COM) di Imigresen untuk setiap pekerja.","Batalkan setiap VP(TE) pekerja melalui ePPAx — maklumkan JTKSM dalam 30 hari selepas penamatan.","Beli tiket penerbangan pulang — majikan menanggung kos pemulangan.","Pulangkan pasport dan semua dokumen asal setiap pekerja.","Bayar semua gaji, lebih masa, dan kelayakan penuh sebelum keberangkatan.","Dapatkan pekerja tandatangan borang penyelesaian akhir."],cost:"Penerbangan pulang: RM 500-2,000 setiap pekerja.",warn:"Pekerja masih boleh failkan tuntutan gaji atau pemecatan tidak adil walaupun selepas pulang ke negara asal.",pitch:"Mercy Skills menguruskan dokumentasi pemulangan, permohonan COM, dan pembatalan ePPAx."},
"F8":{q:"Pekerja saya mahu balik awal sebelum permit tamat",honest:"Pekerja boleh balik awal tetapi permit mesti dibatalkan dengan betul atau caj levi akan berterusan.",s:["Selesaikan semua gaji, cuti, dan elaun terhutang dengan pekerja.","Dapatkan pekerja tandatangan surat peletakan jawatan sukarela atau penamatan bersama.","Mohon Memo Daftar Keluar (COM) di Imigresen.","Batalkan VP(TE) melalui ePPAx untuk menghentikan caj levi.","Pulangkan pasport dan semua dokumen pekerja.","Beli tiket penerbangan pulang — semak kontrak siapa yang menanggung kos.","Maklumkan JTKSM dalam 14 hari dari penamatan melalui ePPAx."],cost:"Permohonan COM: nominal. Pembatalan ePPAx: percuma. Penerbangan: RM 500-1,500.",warn:"Jika anda tidak membatalkan VP(TE), levi akan terus dicaj walaupun pekerja sudah keluar Malaysia.",pitch:"Mercy Skills menguruskan pembatalan VP(TE), permohonan COM, dan semua notifikasi penamatan ePPAx."},
"F9":{q:"Boleh bawa balik pekerja yang pernah dideportasi?",honest:"Pekerja yang dideportasi disenarai hitam. Mereka tidak boleh masuk Malaysia secara sah semasa dalam senarai hitam. Permohonan penghapusan senarai hitam mesti dibuat dahulu.",s:["Pekerja mohon penghapusan senarai hitam dari luar Malaysia — tulis surat rasmi kepada Ketua Pengarah Imigresen, Putrajaya.","Surat mesti termasuk: pasport lama, pasport baru, perintah deportasi, penjelasan penuh, bukti tiada kesalahan seterusnya.","Pemprosesan: 6 bulan hingga 2 tahun tanpa hasil terjamin.","Setelah senarai hitam dihapuskan, majikan boleh mulakan permohonan VDR baru.","JANGAN cuba masuk semula menggunakan pasport berbeza — sistem biometrik akan mengesan.","Mercy Skills boleh memberi nasihat tentang surat penghapusan senarai hitam."],cost:"Penghapusan senarai hitam: bantuan undang-undang disyorkan. VP(TE) baru: kadar levi dan yuran agensi standard.",warn:"Mencuba masuk semasa disenarai hitam dengan pasport berbeza membawa pertuduhan jenayah tambahan.",pitch:"Mercy Skills memberi nasihat tentang proses penghapusan senarai hitam dan menguruskan pengambilan baru setelah dibersihkan."},
"F10":{q:"Pembantu saya hamil — apakah tanggungjawab saya?",honest:"Majikan boleh menamatkan kontrak akibat kehamilan di bawah perjanjian dua hala — tetapi mesti membayar semua gaji terhutang dan menyediakan pemulangan atas tanggungan majikan.",s:["Hantar PRA untuk pemeriksaan perubatan untuk mengesahkan kehamilan.","Bayar semua gaji terhutang penuh.","Mohon Memo Daftar Keluar (COM) di Imigresen.","Beli tiket penerbangan pulang — majikan menanggung kos.","PRA tidak boleh tinggal dan bekerja — Imigresen tidak akan memperbaharui VP(TE) untuk PRA hamil.","Hubungi Mercy Skills untuk penggantian."],cost:"Penerbangan pemulangan: RM 800-1,500. Semua gaji terhutang mesti dibayar penuh.",warn:"Meninggalkan PRA hamil tanpa pemulangan yang betul adalah pelanggaran kebajikan dan undang-undang yang serius.",pitch:"Mercy Skills menguruskan proses pemulangan dan penggantian untuk senario ini."},
"F11":{q:"Pembantu saya enggan bekerja — apa yang boleh saya buat?",honest:"PRA yang enggan menjalankan tugas adalah pelanggaran kontrak. Anda berhak menamatkan — tetapi mesti ikut prosedur yang betul.",s:["Dokumentasikan setiap kejadian secara bertulis — tarikh, masa, apa yang diminta, apa yang ditolak.","Keluarkan amaran lisan rasmi, kemudian amaran bertulis. Berikan masa munasabah untuk bertambah baik.","Jika tiada penambahbaikan: keluarkan notis penamatan mengikut kontrak.","Mohon COM di Imigresen dan atur pemulangan.","Selesaikan semua gaji terhutang sebelum dia berangkat.","Hubungi Mercy Skills — kebanyakan kontrak termasuk klausa penggantian berdasarkan prestasi."],cost:"Penerbangan pemulangan: RM 800-1,500.",warn:"Hukuman fizikal atau merampas pasport adalah haram dan akan mengakibatkan tuduhan jenayah terhadap anda.",pitch:"Kontrak penempatan Mercy Skills termasuk klausa penggantian prestasi."},
"F12":{q:"Boleh saya mengambil pembantu kedua? Saya dah ada satu.",honest:"Isi rumah biasanya hanya boleh mempunyai satu PRA. Pembantu kedua memerlukan kelulusan khas berdasarkan kelayakan tertentu.",s:["Anda layak untuk PRA kedua jika: anda mempunyai 4 atau lebih anak bawah 15 tahun, atau anda/pasangan mengalami penyakit/kecacatan serius, atau anda mempunyai ibu bapa tua yang memerlukan penjagaan sepenuh masa.","Pendapatan isi rumah anda mesti memenuhi ambang yang lebih tinggi.","Mohon melalui Pejabat Imigresen Negeri dengan dokumen sokongan.","Hubungi Mercy Skills untuk menilai kelayakan dan membantu dengan permohonan."],cost:"Yuran penempatan standard terpakai untuk PRA kedua.",warn:"Membawa masuk PRA kedua tanpa kelulusan bermakna PRA kedua tiada status sah.",pitch:"Mercy Skills menilai kelayakan PRA kedua dan menguruskan permohonan penuh."},
"F13":{q:"Saya orang asing dengan EP — boleh saya mengambil pembantu?",honest:"Ya, pemegang EP Kategori I atau Kategori II boleh mengambil PRA. Pemegang EP Kategori III TIDAK layak.",s:["Sahkan anda memegang EP Kategori I (RM 10,000+/bln) atau Kategori II (RM 5,000-9,999/bln).","Keperluan pendapatan masih terpakai: PRA Indonesia memerlukan pendapatan isi rumah RM 7,000/bln, Filipina RM 5,000.","Kelulusan pra-JTKSM diperlukan melalui ePPAx.","Semua prosedur PRA standard terpakai — VDR, FOMEMA, PL(KS).","Hubungi Mercy Skills untuk sahkan kelayakan dan mulakan permohonan."],cost:"Yuran penempatan pembantu standard: Indonesia RM 12,000-15,000, Filipina RM 16,000-18,000.",warn:"Pemegang EP Kategori III TIDAK layak mengambil pembantu rumah.",pitch:"Mercy Skills menguruskan penempatan PRA untuk pemegang EP."},
"F14":{q:"Pekerja lebih masa dan takut pergi ke Imigresen — apa yang perlu saya beritahu mereka?",honest:"Serah diri sukarela sentiasa dilayan lebih baik daripada ditangkap. Lagi lama mereka tunggu, lagi teruk dendanya.",s:["Yakinkan pekerja: berjalan masuk secara sukarela menunjukkan niat baik — Imigresen melayan kes sukarela jauh lebih baik.","Semak bilangan hari tepat lebih masa — jika 90 hari atau kurang, bayar kompaun dan dapatkan Pas Khas.","Bawa pasport dan surat majikan ke pejabat Imigresen terdekat.","Bayar kompaun di situ: RM 30/hari (1-30h), RM 1,000 rata (31-60h), RM 2,000 rata (61-90h).","Lebih 90 hari: pergi ke Bahagian Penguatkuasaan Imigresen — sukarela masih lebih baik.","Mercy Skills boleh membimbing majikan dan pekerja melalui proses serah diri sukarela."],cost:"Kompaun: RM 30/hari (1-30h) | RM 1,000 rata (31-60h) | RM 2,000 rata (61-90h). Pas Khas: RM 100-200.",warn:"Setiap hari tambahan bersembunyi meningkatkan denda dan risiko tahanan.",pitch:"Mercy Skills membimbing majikan melalui proses serah diri sukarela dan pembaharuan langkah demi langkah."},
"F15":{q:"Pekerja saya cedera di tempat kerja — apakah tanggungjawab saya?",honest:"Anda mempunyai kewajipan undang-undang segera di bawah PERKESO, Akta Pekerjaan, dan Akta OSH. Semua pekerja asing (kecuali PRA) mesti didaftarkan dengan PERKESO.",s:["Berikan rawatan perubatan segera — bawa pekerja ke klinik atau hospital panel PERKESO.","Semua kos perubatan untuk kecederaan berkaitan kerja ditanggung oleh PERKESO.","Laporkan kemalangan kepada PERKESO dalam masa 48 jam menggunakan Borang PERKESO 21.","Jika maut atau ketidakhadiran melebihi 4 hari: laporkan kepada DOSH dalam 7 hari.","JANGAN tekan pekerja untuk tidak melaporkan kecederaan.","Pastikan pekerja telah didaftarkan dengan PERKESO dari hari pertama."],cost:"Semua kos ditanggung oleh PERKESO jika pekerja didaftarkan dengan betul. Jika tidak: majikan menanggung 100% kos.",warn:"Kegagalan mendaftarkan pekerja asing dengan PERKESO bermakna majikan menanggung 100% semua kos perubatan.",pitch:"Mercy Skills memastikan setiap pekerja yang kami tempatkan didaftarkan dengan PERKESO dari hari pertama."},
"F16":{q:"Boleh saya pindahkan pekerja ke sektor yang berbeza?",honest:"Ya — pemindahan antara sektor dibenarkan sejak 2025. Prosedur Tukar Majikan dan sektor formal mesti dilakukan melalui ePPAx.",s:["Majikan semasa mohon Tukar Majikan dan kemaskini sektor melalui ePPAx.","VP(TE) baru akan dikeluarkan mencerminkan nama majikan dan sektor baru.","Pekerja TIDAK BOLEH mulai di sektor baru sehingga VP(TE) baru dikeluarkan secara rasmi.","Kadar levi mungkin berubah bergantung pada sektor baru.","Hubungi Mercy Skills untuk memproses permohonan Tukar Majikan ePPAx."],cost:"Tukar Majikan: kadar levi sektor baru terpakai dari tarikh perubahan.",warn:"Bekerja dalam sektor baru sebelum VP(TE) baru dikeluarkan adalah pelanggaran jenayah.",pitch:"Mercy Skills menguruskan pemindahan Tukar Majikan dan sektor melalui ePPAx."},
"F17":{q:"Seorang pekerja minta saya ambil dia terus — tanpa agensi. Bolehkah?",honest:"Mengambil pekerja asing yang datang sendiri tanpa VDR bermakna pekerja tidak boleh bekerja untuk anda secara sah.",s:["Semak status imigresen pekerja semasa di e-Patuh menggunakan nombor pasport mereka.","Jika pekerja ada VP(TE) sah di bawah majikan lain — mohon Tukar Majikan melalui ePPAx.","Jika pekerja dengan Pas Lawatan Sosial — mereka tidak boleh bekerja untuk anda. Mesti mulakan VDR baru dari negara asal.","JANGAN mulakan pekerjaan tanpa VP(TE) sah atas nama syarikat anda.","Hubungi Mercy Skills — kami boleh menilai status dan mengenal pasti laluan sah yang paling pantas."],cost:"Tukar Majikan: levi standard. VP(TE) baru: yuran agensi dan levi penuh.",warn:"Mengupah pekerja dengan Pas Lawatan Sosial walaupun sementara adalah haram di bawah Seksyen 6(3).",pitch:"Mercy Skills boleh menilai status pekerja walk-in dengan cepat dan mengenal pasti laluan sah yang paling pantas."},
"F18":{q:"Pasport pekerja saya hampir tamat — adakah ia mempengaruhi VP(TE)?",honest:"Ya. Jika pasport pekerja tamat, stiker VP(TE) di dalamnya menjadi tidak sah walaupun VP(TE) sendiri belum tamat.",s:["Semak tamat tempoh pasport — mesti ada sekurang-kurangnya 6 bulan kesahihan untuk kelulusan pembaharuan pas.","Pekerja mohon pembaharuan pasport di kedutaan negara asal di Malaysia.","Setelah pasport baru dikeluarkan, bawa kedua-dua pasport ke Imigresen untuk pemindahan endorsemen.","Teruskan dengan pembaharuan VP(TE) melalui ePPAx jika juga hampir tamat.","Mercy Skills menyelaraskan proses pemindahan pasport dan pembaharuan."],cost:"Pembaharuan pasport kedutaan: lebih kurang RM 50-200. Pembaharuan VP(TE) melalui Mercy Skills: RM 400-600.",warn:"Pekerja dengan pasport tamat secara efektifnya tidak berdokumen walaupun VP(TE) belum tamat.",pitch:"Mercy Skills menjejak tarikh tamat tempoh pasport dan VP(TE) untuk semua pelanggan."},
"F19":{q:"Harga pembantu Indonesia terlalu mahal — boleh negotiate?",honest:"Harga maksimum yang dikawal selia untuk penempatan PRA Indonesia melalui MRA berlesen adalah RM 15,000 all-in. Sesiapa yang menawarkan di bawah RM 10,000 hampir pasti tidak berlesen.",s:["Fahami apa yang termasuk dalam yuran: carian sumber, dokumentasi, VDR, FOMEMA, PL(KS), insurans — ini komprehensif.","Terma pembayaran membantu: Mercy Skills menerima deposit 50% semasa tandatangan dan 50% semasa ketibaan.","Pertimbangkan pembantu Filipina jika bajet fleksibel — RM 16,000-18,000, umumnya sangat boleh dipercayai.","JANGAN melibatkan ejen yang menawarkan pembantu Indonesia pada RM 6,000-8,000 — hampir pasti penipuan.","Sahkan mana-mana agensi di jtksm.gov.my sebelum membayar apa-apa wang."],cost:"PRA Indonesia: maksimum RM 15,000 all-in melalui MRA berlesen. Filipina: RM 16,000-18,000.",warn:"Tawaran harga di bawah pasaran hampir selalu mengakibatkan pekerja tidak dihantar atau pekerja dengan dokumen palsu.",pitch:"Mercy Skills menawarkan harga all-in yang telus dengan terma bayaran 50/50 dan waranti abscondment."},
"F20":{q:"Pekerja saya sakit dan di hospital — siapa yang bayar?",honest:"Untuk penyakit berkaitan kerja: PERKESO menanggung kos jika pekerja didaftarkan. Untuk penyakit tidak berkaitan kerja: majikan bertanggungjawab semasa tempoh pekerjaan.",s:["Tentukan sama ada penyakit berkaitan kerja — ini menentukan perlindungan mana yang terpakai.","Berkaitan kerja: bawa pekerja ke hospital panel PERKESO. Failkan tuntutan PERKESO dalam 48 jam.","Tidak berkaitan kerja: majikan menanggung kos perubatan di bawah Akta Pekerjaan.","Untuk PRA: insurans perubatan SKHPPA meliputi kemasukan hospital sehingga RM 20,000/tahun.","Majikan masih mesti membayar gaji semasa kemasukan hospital."],cost:"PERKESO menanggung jika berkaitan kerja dan pekerja didaftarkan. Tidak berkaitan kerja: majikan bayar.",warn:"Jika pendaftaran PERKESO tidak dibuat, majikan menanggung 100% semua kos perubatan secara peribadi.",pitch:"Mercy Skills memastikan semua pekerja dilindungi di bawah PERKESO dan PRA mempunyai insurans SKHPPA aktif dari hari pertama."},
"F21":{q:"Majikan ugut akan deport saya jika saya adukan — apa yang perlu saya buat?",honest:"Ini adalah ugutan haram. Majikan anda tiada kuasa untuk mendeportasi anda — hanya Jabatan Imigresen Malaysia yang boleh berbuat demikian.",s:["Ketahui hak anda: majikan anda tidak boleh mendeportasi anda. Hanya Jabatan Imigresen yang boleh.","Jika pas anda sah, anda adalah sah di Malaysia dan dilindungi oleh undang-undang pekerjaan Malaysia.","Dokumentasikan ugutan: catat dengan tepat apa yang dikatakan, bila, dan sebarang saksi.","Laporkan kepada JTKSM di 03-8000 8000 atau melalui aplikasi eAduan JTKSM.","Hubungi kedutaan negara anda untuk perlindungan konsular.","Jika ahli MyShield: hubungi pegawai perlindungan anda — mereka akan menghubungi majikan bagi pihak anda.","Talian TIP 15000 jika anda percaya anda dikawal atau diperdagangkan."],cost:"Tiada kos untuk melapor.",warn:"Undang-undang Malaysia melindungi pekerja yang membuat aduan sah daripada tindakan balas.",pitch:"MyShield pada RM 20/bulan — pegawai khusus anda bercakap dengan majikan bagi pihak anda."},
"F22":{q:"Kontrak saya kata gaji RM 1,800 tapi majikan bayar RM 1,200 sahaja",honest:"Ini adalah pelanggaran kontrak pekerjaan anda yang jelas. Anda berhak mendapat gaji yang tertera dalam kontrak anda.",s:["Kumpul bukti: kontrak yang ditandatangani, semua penyata bank, slip gaji, mesej WhatsApp.","Kira jumlah kekurangan untuk setiap bulan yang kurang dibayar.","Hantar Surat Tuntutan rasmi kepada majikan melalui Pos Berdaftar — nyatakan jumlah terhutang dan tarikh akhir 7 hari.","Failkan aduan melalui aplikasi eAduan JTKSM atau pergi ke pejabat JTKSM terdekat.","JTKSM buat pengantaraan. Mahkamah Buruh boleh memberi award sehingga RM 50,000.","Jika ahli MyShield: pegawai menghubungi majikan secara rasmi dalam masa 24 jam."],cost:"Aduan JTKSM: PERCUMA. Tuntutan Mahkamah Buruh: PERCUMA.",warn:"Failkan dalam 60 hari dari setiap pembayaran kurang.",pitch:"Ahli MyShield mendapat tindakan segera — pegawai menghubungi majikan dalam 24 jam. RM 20/bulan."},
"F23":{q:"Saya mahu tukar majikan tapi bos tidak mahu lepaskan saya",honest:"Majikan anda tidak boleh menahan anda secara paksa. VP(TE) memerlukan majikan semasa untuk mohon Tukar Majikan melalui ePPAx — tetapi JTKSM boleh memaksa mereka bekerjasama.",s:["Anda tidak boleh begitu sahaja mulai bekerja untuk orang lain — VP(TE) terikat kepada majikan semasa.","Minta Tukar Majikan secara bertulis kepada majikan semasa — e-mel atau WhatsApp sebagai rekod.","Jika majikan enggan tanpa sebab sah: lapor kepada JTKSM di 03-8000 8000.","Jika majikan juga menahan pasport anda: lapor kepada polis (999) dan JTKSM serentak.","Jika ada ancaman, penderaan, atau buruh paksa: hubungi TIP Hotline 15000 serta-merta.","Setelah majikan bekerjasama: Tukar Majikan melalui ePPAx berjalan seperti biasa."],cost:"Tiada kos untuk lapor kepada JTKSM. Tukar Majikan: levi standard.",warn:"Jangan tinggalkan majikan semasa dan mula bekerja di tempat lain — ini mencipta tanggungjawab jenayah untuk anda dan majikan baru.",pitch:"Pegawai MyShield membuat pengantaraan secara langsung dengan majikan bagi pihak pekerja. RM 20/bulan."},
"F24":{q:"Majikan saya tidak memberi saya hari rehat — adakah itu sah?",honest:"Tidak — ini adalah haram. Di bawah Akta Pekerjaan 1955, semua pekerja termasuk pekerja asing berhak mendapat sekurang-kurangnya satu hari rehat seminggu.",s:["Dokumentasikan setiap hari bekerja tanpa hari rehat — tarikh adalah penting.","Maklumkan majikan secara bertulis (WhatsApp boleh diterima sebagai bukti) meminta hari rehat yang sah.","Jika majikan enggan: failkan aduan melalui aplikasi eAduan JTKSM.","Untuk PRA: hak yang sama terpakai di bawah Akta Pekerjaan dan perjanjian dua hala.","Jika anda bekerja pada hari rehat, majikan mesti membayar gaji harian pro-rata tambahan.","Jika ahli MyShield: pegawai menghubungi majikan dan merujuk peruntukan undang-undang yang khusus."],cost:"Tiada kos untuk melapor.",warn:"Majikan yang secara konsisten menafikan hari rehat menghadapi denda di bawah Akta Pekerjaan.",pitch:"MyShield pada RM 20/bulan — pegawai menguatkuasakan hak anda secara langsung dengan majikan anda."},
"F25":{q:"Majikan potong gaji tanpa beritahu saya",honest:"Potongan gaji tanpa persetujuan bertulis terlebih dahulu atau asas yang sah adalah haram di bawah Seksyen 24 Akta Pekerjaan 1955.",s:["Semak kontrak pekerjaan untuk melihat potongan apa yang telah dipersetujui secara bertulis.","Potongan haram termasuk: yuran makanan/penginapan tanpa perjanjian terlebih dahulu, hutang pengambilan, potongan penalti yang tidak dalam kontrak.","Tulis kepada majikan meminta penjelasan bertulis dan perincian setiap potongan.","Jika tiada penjelasan yang sah: failkan aduan di JTKSM melalui aplikasi eAduan.","JTKSM boleh memerintahkan majikan membayar balik semua potongan yang tidak sah.","Jika potongan adalah untuk hutang pengambilan — ini adalah petanda pemerdagangan. Hubungi TIP 15000."],cost:"Aduan JTKSM: PERCUMA.",warn:"Potongan kos pengambilan dari gaji adalah isyarat bahaya besar untuk perhambaan hutang dan pemerdagangan.",pitch:"Pegawai MyShield mengendalikan kes pertikaian gaji termasuk potongan tidak sah. RM 20/bulan."},
"B1":{q:"Mercy Skills — Bekalan Pekerja Asing VP(TE)",s:["Penempatan pekerja asing dari hujung ke hujung di bawah VP(TE).","Sektor: Pembuatan, Pembinaan, Perladangan, Pertanian, Perkhidmatan, Perlombongan.","Negara sumber: Indonesia, Bangladesh, Nepal, Myanmar, India, Filipina, Vietnam, Kemboja, Pakistan, Sri Lanka.","Kami uruskan: Seksyen 60K, kuota, VDR, levi, FOMEMA, VP(TE), i-Kad.","Pembayaran: deposit 50% semasa tandatangan, 50% semasa ketibaan."],cost:"Levi: RM 1,850/tahun (pembuatan) | RM 640/tahun (perladangan). Yuran agensi: sebut harga per kes.",warn:"Mesti lengkapkan siaran MYFutureJobs 30 hari dan kelulusan Seksyen 60K terlebih dahulu."},
"B2":{q:"Mercy Skills — Bekalan dan Penempatan Pembantu Rumah",s:["Penempatan pembantu rumah penuh dari sumber hingga penghantaran.","PRA Indonesia: RM 12,000-15,000 all-in. Gaji minimum RM 1,500/bulan.","PRA Filipina: RM 16,000-18,000 all-in. Gaji minimum RM 1,800/bulan.","Termasuk: kelulusan pra-JTKSM, VDR, insurans, FOMEMA, PL(KS).","Pembayaran: deposit 50%, 50% semasa ketibaan. Waranti abscondment 3-6 bulan."],cost:"Indonesia: RM 12,000-15,000. Filipina: RM 16,000-18,000. Levi: DIKECUALIKAN.",warn:"Yuran kerajaan (FOMEMA, caj Imigresen, bon peribadi) adalah berasingan — dibayar oleh majikan."},
"B3":{q:"Mercy Skills — Pembaharuan Permit Semua Jenis",s:["Pembaharuan penuh untuk semua jenis: VP(TE), PRA, pemegang PVP.","Kami uruskan: FOMEMA, ePPAx, levi, Imigresen, pemulangan stiker permit.","Peringatan automatik 90 hari sebelum tamat tempoh. Diskaun kelompok untuk 5+ pekerja."],cost:"RM 400-600 setiap pekerja. Pembantu: RM 1,500-2,500. Levi berasingan.",warn:"Satu hari lewat bermakna pekerja haram. Denda RM 5,000-30,000 setiap pekerja."},
"B4":{q:"Mercy Skills — ESD dan Pas Pekerjaan EP",s:["Pendaftaran ESD (sekali): RM 2,000-3,000.","EP Kat I (RM 10K+/bln): RM 3,000-5,000. EP Kat II (RM 5K-9,999): RM 2,000-3,500. EP Kat III (RM 3K-4,999): RM 1,500-2,500.","Pembaharuan EP: RM 1,000-2,000. PVP (sehingga 12 bulan): RM 1,500-2,500.","Pembayaran: 50% pendahuluan, 50% semasa penghantaran."],cost:"Pendaftaran ESD: RM 2,000-3,000. Yuran EP kerajaan: RM 2,160 (berasingan, dibayar oleh majikan).",warn:"CGC wajib mulai 2026 — benarkan masa tambahan 2-4 minggu."},
"B5":{q:"Mercy Skills — Pengambilan Pekerja Tempatan Malaysia",s:["Penempatan bakat Malaysia dari hujung ke hujung.","Kami iklan, saring, senarai pendek — anda hanya jumpa 3-5 calon terbaik.","Sasaran: F&B, pembuatan, runcit, logistik. Joey berbahasa Mandarin — kelebihan utama untuk jangkauan restoran Cina.","Yuran: 1 bulan gaji kasar. Tiada penempatan = tiada yuran. Jaminan penggantian percuma 30 hari."],cost:"Yuran: 1 bulan gaji kasar. Pengekalan 50% semasa perjanjian.",warn:"Pengekalan dibayar semasa tandatangan tanpa mengira hasil."},
"B6":{q:"MyShield — Perlindungan Pekerja Migran (RM 20/bulan)",s:["Platform keahlian perlindungan untuk SEMUA pekerja migran di Malaysia.","Rata RM 20/bulan — tiada caj tersembunyi, tiada yuran kes.","Ahli mendapat: Pegawai perlindungan khusus, pertikaian gaji, pemulihan pasport, tindak balas penderaan, SOS 24 jam, peti dokumen.","Sertai melalui Telegram. Hotline: +60199888720. Dimiliki oleh Nikko Group Sdn Bhd."],cost:"RM 20/bulan rata. Tahunan: RM 200.",warn:"B2C — pekerja daftar dan bayar sendiri. BUKAN ditaja majikan.",pitch:"Untuk kos kurang dari sekali makan, pekerja mendapat pegawai peribadi yang berjuang untuk hak mereka 24/7."},
"B7":{q:"MyWakil — Perlindungan Kerjaya untuk Pekerja Malaysia",s:["Platform ejen kerjaya peribadi pertama Malaysia untuk pekerja Malaysia.","3 peringkat: Pelajar (tiada EPF) RM 10/bulan | Penganggur RM 17/bulan | Bekerja 1% gaji asas (min RM 17).","Ahli mendapat: Pegawai khusus, wakil majikan, cari kerja, semakan kontrak, 2 sesi kesihatan mental percuma/tahun.","Pembinaan apl sedang berjalan. Di bawah Mercy Skills Consultancy JTKSM 928."],cost:"Pelajar: RM 10/bulan. Penganggur: RM 17/bulan. Bekerja: 1% gaji asas (min RM 17).",warn:"MyWakil adalah untuk pekerja Malaysia sahaja. Pekerja asing pergi ke MyShield.",pitch:"Apabila pekerja Malaysia menghubungi tentang masalah kerja — MyWakil memberi mereka pegawai khusus dari RM 10/bulan."},
"B8":{q:"MyDestinasi — Program Pelan Hala Tuju Kerjaya Peribadi",s:["Pelan hala tuju kerjaya peribadi digabungkan dalam setiap keahlian MyWakil — tiada bayaran tambahan.","Mana-mana warganegara Malaysia dengan mana-mana impian kerjaya mendapat Pelan Hala Tuju Kerjaya Peribadi penuh.","Termasuk sesi impian, semakan setiap 6 bulan, penempatan kerja pertama yang tepat arah.","Aktivasi dari Hari 1 keahlian MyWakil."],cost:"Termasuk dalam MyWakil — tiada bayaran tambahan.",warn:"MyDestinasi BUKAN produk berasingan. Digabungkan dalam MyWakil sahaja.",pitch:"Jika seseorang tidak tahu apa yang perlu dilakukan dengan kerjaya mereka — MyDestinasi memetakan impian mereka menjadi pelan langkah demi langkah."},
"C1":{q:"Skrip panggilan pembuka — Pekerja Asing (BM)",s:["Cakap: Selamat pagi, boleh saya bercakap dengan tuan atau puan yang uruskan pekerja atau HR?","Cakap: Nama saya [Nama] dari Mercy Skills Consultancy — agensi berlesen JTKSM 928.","Cakap: Kami pakar dalam pengambilan pekerja asing yang sah untuk syarikat di Shah Alam dan Klang.","Tanya: Berapa ramai pekerja asing yang syarikat kini ada?","Cakap: Ada permit yang akan tamat dalam 3-6 bulan? Kami uruskan semua ePPAx, FOMEMA, dan Imigresen.","Tutup: Boleh saya hantarkan senarai perkhidmatan melalui WhatsApp sekarang?"]},
"C2":{q:"Skrip panggilan pembuka — Pekerja Asing (Inggeris)",s:["Cakap: Good morning, may I speak with the person handling HR or workers?","Cakap: My name is [Name] from Mercy Skills Consultancy — licensed agency JTKSM 928.","Tanya: How many foreign workers does your company currently have?","Cakap: Are any permits expiring in the next 3-6 months? We handle all ePPAx, FOMEMA, and Immigration.","Tutup: May I send you our service list on WhatsApp right now?"]},
"C3":{q:"Skrip panggilan pembuka — Mandarin (perniagaan Cina)",s:["Cakap: 你好，请问老板或负责人事的人在吗？","Cakap: 我叫 [Nama]，来自 Mercy Skills Consultancy，牌照 JTKSM 928。","Tanya: 请问贵公司目前有多少名外劳？","Cakap: 未来 3-6 个月有没有准证需要续期？我们负责所有 ePPAx、FOMEMA 及移民局事宜。","Tutup: 我可以把服务清单发到您的 WhatsApp 吗？"]},
"C4":{q:"Skrip jualan penempatan pembantu rumah",s:["Cakap: Selamat pagi, saya dari Mercy Skills Consultancy — agensi pembantu rumah berlesen JTKSM 928.","Tanya: Adakah anda mencari pembantu rumah, atau permit pembantu anda hampir tamat?","Cakap: Kami bekalkan pembantu Indonesia dari RM 12,000 all-in dan Filipina dari RM 16,000.","Cakap: Kontrak kami termasuk waranti abscondment 3-6 bulan.","Tutup: Boleh saya hantarkan brosur perkhidmatan pembantu kami melalui WhatsApp sekarang?"],cost:"Indonesia: RM 12,000-15,000. Filipina: RM 16,000-18,000."},
"C5":{q:"Skrip jualan pembaharuan permit",s:["Cakap: Hi [Nama], semakan pantas — adakah mana-mana permit pekerja anda akan tamat dalam 3 bulan?","Cakap: Pembaharuan lewat bermakna denda RM 5,000-30,000 setiap pekerja.","Cakap: Dari RM 400 setiap pekerja — kami tempah FOMEMA, hantar ePPAx, selaraskan Imigresen, pulangkan stiker baru.","Tutup: Boleh saya semak tarikh tamat tempoh anda sekarang dan berikan sebut harga pantas?"],cost:"RM 400-600 setiap pekerja. Pembantu: RM 1,500-2,500."},
"C6":{q:"Skrip jualan EP dan ESD",s:["Cakap: Selamat pagi, saya dari Mercy Skills — kami menguruskan permohonan ESD Pas Pekerjaan.","Tanya: Adakah anda mempunyai kakitangan ekspatriat atau merancang mengambil profesional asing pada RM 3,000+/bulan?","Cakap: Kami uruskan pendaftaran portal ESD penuh dan permohonan EP.","Tutup: Boleh saya hantarkan panduan EP kami melalui WhatsApp sekarang?"],cost:"ESD: RM 2,000-3,000. EP Kat I: RM 3,000-5,000. Kat II: RM 2,000-3,500. Kat III: RM 1,500-2,500."},
"C7":{q:"Bantahan: Kami urus pekerja kami sendiri",s:["Jawab: Bagus sekali — ramai pelanggan terbaik kami juga mengurus pasukan mereka sendiri.","Cakap: Perkhidmatan paling popular kami ialah pembaharuan permit — dari RM 400/pekerja, pasukan HR anda bebas sepenuhnya.","Tanya: Adakah semua tarikh tamat tempoh pekerja anda dijejak? Kami boleh semak secara percuma sekarang."]},
"C8":{q:"Bantahan: Terlalu mahal atau tiada bajet",s:["Jawab: Levi kerajaan RM 1,850 setiap pekerja setahun adalah tetap tidak kira siapa yang anda gunakan.","Cakap: Yuran perkhidmatan kami bermula dari RM 400 sahaja setiap pembaharuan.","Cakap: Satu denda pembaharuan lewat adalah RM 5,000-30,000. Itu membayar 10+ tahun perkhidmatan kami."]},
"C9":{q:"Bantahan: Bukan masa yang sesuai",s:["Jawab: Faham sepenuhnya — bila masa yang lebih baik untuk saya hubungi semula?","Cakap: Jika mana-mana permit tamat semasa kami menunggu, denda bermula serta-merta pada tarikh tamat.","Tawaran: Saya boleh semak tarikh tamat tempoh sekarang — 2 minit, percuma sepenuhnya."]},
"C10":{q:"Bantahan: Dah ada agensi atau pembekal lain",s:["Jawab: Tiada masalah — bagus bahawa anda sudah bekerja dengan seseorang.","Tanya: Adakah agensi semasa anda berlesen JTKSM? Hanya untuk memastikan syarikat anda dilindungi sepenuhnya.","Cakap: Jika anda perlukan sandaran, Mercy Skills JTKSM 928 sentiasa ada.","Tutup: Boleh saya hantarkan perbandingan perkhidmatan kami melalui WhatsApp? Tiada komitmen."]}
};
var TR_ZH={
"A1":{q:"工人逾期逗留或准证过期",s:["计算从准证到期日至今天的确切天数。","1-30天：在最近的移民局缴纳每天RM 30的复合罚款。携带护照和雇主信函。","31-60天：在移民局缴纳RM 1,000统一复合罚款。","61-90天：在移民局缴纳RM 2,000统一复合罚款。","逾期超过90天：立即主动向移民局执法部门自首。","同日申请特别准证（RM 100-200）以在解决问题期间合法化逗留。"],cost:"罚款：RM 30/天（1-30天）| RM 1,000统一（31-60天）| RM 2,000统一（61-90天）。特别准证：RM 100-200。",warn:"逾期超过90天意味着执法部门——面临拘留、起诉、遣返、黑名单的风险。",pitch:"Mercy Skills的VP(TE)续期服务在每次到期前90天开始。使用我们的服务就不会发生这种情况。"},
"A2":{q:"如何合法雇用外籍工人",s:["通过eppax.gov.my的ePPAx获得第60K条款批准——在其他一切之前是强制性的。","在MYFutureJobs发布职位空缺至少30天。","在内政部一站式中心（OSC）申请配额。","聘用JTKSM持牌代理——在jtksm.gov.my验证执照。","代理通过ePPAx提交VDR并支付征费。工人进入马来西亚，在30天内接受FOMEMA体检。","通过FOMEMA体检后颁发VP(TE)和i-Kad。"],cost:"政府征费：RM 1,850/年（制造业/服务业）| RM 640/年（种植业）。Mercy Skills费用：按案例报价。",warn:"通过无证中间人雇用——雇主承担全部责任。每名非法工人罚款RM 5,000至30,000。",pitch:"Mercy Skills JTKSM 928处理整个流程。您批准工人，我们负责交付。"},
"A3":{q:"雇主被查获雇用非法工人",s:["立即停止所有非法工人工作。","立即在app1.imi.gov.my/e-patuh通过e-Patuh检查每一名工人。","主动向SISPAA举报——主动举报获得显著更宽松的处理。","立即联系Mercy Skills启动合法替换流程。","此后14天内通过ePPAx通知JTKSM任何新工人雇用情况。"],cost:"罚款：每名非法工人RM 5,000至30,000。第二次违规：最低RM 10,000。",warn:"2026年1至2月，347名雇主被罚款RM 598万。无知不是第55E条款下的辩护理由。",pitch:"使用Mercy Skills时，每位工人都经过e-Patuh验证。这种情况不会发生。"},
"A4":{q:"准证续期——VP(TE)或EP即将到期",s:["如果到期日在90天内，立即开始。","VP(TE)：通过ePPAx提交续期申请。安排FOMEMA体检（RM 180-250）。","支付年度征费：RM 1,850（制造业/服务业）或RM 640（种植业）。","EP：通过Xpats Gateway提交。支付RM 2,160。允许6-8周处理时间。","或致电Mercy Skills——我们从每名工人RM 400起处理一切事务。"],cost:"Mercy Skills续期：每名工人RM 400-600。女佣续期：RM 1,500-2,500。",warn:"逾期续期意味着工人在到期日当天成为非法人员。每名工人罚款RM 5,000-30,000。",pitch:"Mercy Skills在每次到期前90天发送提醒并处理所有续期文件。"},
"A5":{q:"想要雇用女佣或家庭佣工",s:["雇主：马来西亚公民/永久居民/EP第I或II类，年龄21岁及以上，最低家庭收入RM 3,000-7,000。","通过ePPAx获取JTKSM预批准——2025年起强制执行。","批准来源国：印度尼西亚、菲律宾、柬埔寨、斯里兰卡、尼泊尔、印度、越南、泰国、老挝。","联系Mercy Skills——我们搜寻、筛选、处理所有文件并负责交付。","FDH进入马来西亚。雇主在入境点接收她。30天内进行FOMEMA体检。","穆斯林雇主只能雇用穆斯林FDH。每户家庭最多一名FDH。"],cost:"印尼：RM 12,000-15,000全包。菲律宾：RM 16,000-18,000。征费：豁免。最低工资：印尼RM 1,500/月，菲律宾RM 1,800/月。",warn:"只使用JTKSM持牌代理。无证代理是女佣诈骗最常见的来源。",pitch:"Mercy Skills全套女佣安置从RM 12,000起（印尼），RM 16,000起（菲律宾）。3-6个月逃跑保证。"},
"A6":{q:"女佣逃跑或失踪",s:["在24小时内向最近的警察局报警。","在任何移民局取得《外籍工人逃跑报告表》并立即提交。","通过ePPAx举报以取消PL(KS)并停止征费计费。","如果未正确举报，个人债券将被没收。","查看Mercy Skills合同中的逃跑保证（3-6个月）。"],cost:"如未举报，个人债券被没收。替换须缴纳新的安置费用。",warn:"必须在24小时内举报。逃跑的FDH将被移民局列入黑名单。",pitch:"Mercy Skills合同包含3-6个月的逃跑保证。我们管理整个替换流程。"},
"A7":{q:"工人或女佣工资未付或逾期",s:["收集证据：银行对账单、工资单、雇佣合同、WhatsApp消息截图。","通过挂号信向雇主发送正式催款函——注明欠款金额及7天截止日期。","通过eAduan JTKSM应用程序或jtksm.gov.my/complaints提交投诉。","携带所有原始文件到最近的JTKSM办公室当面投诉。","JTKSM进行调解。劳工法庭第69条款——最高RM 50,000，无需律师。"],cost:"JTKSM投诉：免费。劳工法庭申索：免费。",warn:"在违规发生后60天内提交投诉。保存所有电子证据。",pitch:"MyShield会员（RM 20/月）可获得即时官员协助。"},
"A8":{q:"雇主扣押工人护照",s:["这是1966年护照法第12(1)(f)条款下的刑事罪行——立即采取行动。","工人同时向最近的警察局报警并向移民局提交单独报告。","致电JTKSM 03-8000 8000和TIP热线15000。","ATIPSOM保护适用——工人在举报期间不会被起诉。","雇主面临最高RM 10,000罚款或5年监禁。"],cost:"举报无需费用。",warn:"马来西亚法律：工人随时保管自己的护照。无任何例外。",pitch:"Mercy Skills所有安置合同均包含强制性护照保管条款。"},
"A9":{q:"为外籍专业人士申请就业准证（EP）",s:["雇主在ESD门户注册：esd.imi.gov.my。","申请外籍人员职位批准。从本国获取良好品行证明（CGC）——额外留出2-4周时间。","通过Xpats Gateway提交：护照、学历证书、合同、公司文件、CGC。","支付RM 2,160。处理时间：第I/II类6-8周，第III类8-12周。","签发VDR。员工进入马来西亚。在护照上背书EP。"],cost:"政府费用：RM 2,160。Mercy Skills服务：第I类RM 3,000-5,000 | 第II类RM 2,000-3,500 | 第III类RM 1,500-2,500。",warn:"2026年起CGC为强制性要求——留出额外时间。第I类：RM 10K+/月。第II类：RM 5K-9,999。第III类：RM 3K-4,999。",pitch:"Mercy Skills处理完整的ESD注册和EP申请。"},
"A10":{q:"女佣中介诈骗、不退款或违约",s:["收集证据：签署的合同、付款收据、导出的WhatsApp聊天记录。","通过挂号信发送正式催款函——注明违约内容及7天截止日期。","提交eAduan JTKSM——威胁中介执照续期，效果显著。","同时在TTPM（ttpm.gov.my）提出申诉——最高RM 50,000，仅需RM 5申请费。"],cost:"TTPM申请费：仅RM 5。最多可追回RM 50,000。",warn:"同时提交JTKSM和TTPM——双重施压获得最快结果。",pitch:"Mercy Skills持有JTKSM 928执照。开始任何工作前签订书面协议。"},
"A11":{q:"女佣遭雇主虐待",s:["FDH直接去最近的警察局——不是中介，不是移民局。","报警并获取报警单号。","联系大使馆：印度尼西亚大使馆03-4253 2100或菲律宾大使馆03-2148 4233。","致电JTKSM 03-8000 8000申请紧急保护令。","如果护照也被扣押：在移民局单独提交护照法投诉。"],cost:"举报无需费用。雇主面临刑事起诉。",warn:"在投诉活跃期间，切勿建议FDH返回雇主处。警察局优先——始终如此。",pitch:"这正是MyShield存在的原因——RM 20/月，专属官员24/7待命。"},
"A12":{q:"人口贩卖或强迫劳动",s:["立即拨打TIP热线15000——24小时、匿名、多语言服务。","ATIPSOM保护：受害者不会因贩卖行为导致的移民违规而被起诉。","同时向JTKSM（03-8000 8000）和警察（999）举报。","主要指标：扣押护照、扣押工资、限制行动、债务奴役。"],cost:"举报无需费用。贩卖者面临3-20年监禁。",warn:"受害者受到充分保护。ATIPSOM豁免意味着举报时不会因移民违规被起诉。",pitch:"Mercy Skills所有安置合同均包含强制性护照保管和银行转账工资条款。"},
"A13":{q:"工人想换雇主",s:["VP(TE)持有者：现任雇主通过ePPAx申请换雇主。2025年起允许跨行业转移。","在签发新VP(TE)之前，切勿开始在新雇主处工作。","EP持有者：先取消现有EP。新雇主通过Xpats Gateway申请新EP（RM 2,160）。","公司倒闭：当天在移民局申请特别准证（RM 100-200），然后通过ePPAx申请换雇主。"],cost:"换雇主：标准征费适用。特别准证：RM 100-200。",warn:"在签发新准证之前在新雇主处工作是刑事违规行为。",pitch:"Mercy Skills通过ePPAx管理换雇主申请——工人在整个过渡期间保持合法身份。"},
"A14":{q:"学生准证兼职工作规定",s:["只有公立大学或私立高等教育机构学生才能兼职——语言中心学生不能工作。","只能在学期假期或超过7个连续天的公共假期期间工作。","仅4个允许行业：（1）餐厅——服务员/厨房，非收银员。（2）酒店——一般服务，非歌手/按摩师/GRO。（3）加油站。（4）迷你市场。每周最多20小时。","申请方式：获取工作邀请函，提交到大学国际学生办公室，学生和大学代表必须一同前往移民局，等待书面批准，然后再开始工作。"],cost:"兼职工作批准：免费。学生准证：每年RM 60。",warn:"在学期期间工作是非法的。零工工作不在批准范围内。",pitch:"MyWakil学生会员每月RM 10——专属官员协助了解就业权利。"},
"A15":{q:"如何提交投诉——一般指南",s:["移民违规：SISPAA网址imi.spab.gov.my或致电03-8000 8000。","劳资纠纷：eAduan JTKSM应用或jtksm.gov.my。","人口贩卖：TIP热线15000——24小时、匿名服务。","腐败官员：MACC 1-800-88-6000。","中介违约：TTPM ttpm.gov.my——申请费RM 5，最高RM 50,000。","紧急情况：警察999。"],cost:"所有渠道免费，除TTPM（申请费RM 5）。",warn:"自愿举报始终获得更宽松的处理。",pitch:"Mercy Skills客户获得关于使用哪个渠道的直接指导。"},
"F1":{q:"我有工人但没有准证——现在可以办准证吗？",honest:"是的，您可以申请VP(TE)——但前提是工人通过官方入境点合法进入马来西亚。非法入境的工人无法在马来西亚合法化，必须先返回原籍国。",s:["检查：工人是否通过官方入境点（吉隆坡国际机场、新山CIQ、官方陆地边境）进入？如果是——继续。如果否——参见步骤6。","在移民局为每名工人申请特别准证（每人RM 100-200）以合法化逗留。","雇主通过ePPAx申请第60K条款批准。","在MYFutureJobs发布30天，然后在OSC申请配额。","联系Mercy Skills（JTKSM 928）处理VDR、FOMEMA、征费和VP(TE)。","非法入境的工人：必须通过《出境备忘录》（COM）离开马来西亚，返回原籍国，然后通过正当VDR程序重新入境。"],cost:"特别准证：每名工人RM 100-200。征费：RM 1,850/年。Mercy Skills：按案例报价。",warn:"没有有效准证的工人使雇主面临每名工人RM 5,000-30,000的罚款风险。",pitch:"Mercy Skills处理这种确切情况——从特别准证到完整VP(TE)。今天就联系我们。"},
"F2":{q:"工人准证两个月前就到期了——对我有什么影响？",honest:"您的工人已经非法逗留2个月了。您面临每名工人RM 5,000-30,000的罚款风险。立即采取行动。",s:["立即停止工人工作。","在e-Patuh上检查每名工人的确切到期日。","工人缴纳逾期逗留罚款：31-60天=每名工人统一RM 1,000。","在处理续期期间为每名工人申请特别准证（RM 100-200）。","立即通过ePPAx提交续期申请，安排FOMEMA体检。","考虑主动向移民局披露——自我举报比在突击检查中被发现获得更宽松的处理。","致电Mercy Skills紧急处理续期流程。"],cost:"逾期逗留罚款：每名工人RM 1,000（31-60天）。特别准证：RM 100-200。续期：每名工人RM 400-600。",warn:"每增加一天都会增加您的法律风险。不要拖延。",pitch:"Mercy Skills处理紧急准证续期。我们可在您致电后24小时内开始处理。"},
"F3":{q:"通过中介招聘工人但他们没有i-Kad或文件",honest:"这是一个严重情况。如果中介没有执照，工人很可能没有有效的移民身份。无论工人来源如何，雇主在第55E条款下承担全部责任。",s:["使用工人护照号码在e-Patuh上检查每名工人。","如果e-Patuh显示无记录——工人没有有效身份。立即停止工作。","主动向SISPAA举报。","在JTKSM向无证中介提出投诉。","合法入境的工人：申请特别准证并通过Mercy Skills开始VP(TE)流程。","无文件的工人：联系移民执法部门自愿自首。","今后：在支付任何押金之前，务必在jtksm.gov.my验证JTKSM执照。"],cost:"潜在罚款：每名工人RM 5,000-30,000。",warn:"无证中介是马来西亚这种情况的首要原因。",pitch:"Mercy Skills持有JTKSM 928完整执照。为每名工人提供书面协议和经验证的文件。"},
"F4":{q:"工人在我工厂工作但准证是另一家公司的名字",honest:"这是VP(TE)条件的刑事违规行为。工人的准证绑定于其上注明的雇主。工人和您的公司都负有责任。",s:["立即停止工人在您的场所工作。","VP(TE)上注明的雇主必须通过ePPAx申请换雇主。","2025年起允许跨行业转移。","工人在签发带有您公司名称的新VP(TE)之前不得恢复工作。","联系Mercy Skills处理换雇主申请。"],cost:"换雇主：标准征费适用。处理时间：2-4周。",warn:"允许工人继续以另一家公司名义工作会使两家公司都面临起诉风险。",pitch:"Mercy Skills通过ePPAx处理换雇主——工人在整个过渡期间保持合法身份。"},
"F5":{q:"我的外籍工人在工作场所去世了——我该怎么办？",honest:"这是工作场所死亡事故。您在SOCSO、就业法和移民法下立即承担法律义务。",s:["立即致电警察（999）和救护车。","在48小时内向SOCSO举报，网址perkeso.gov.my或致电1-300-22-8000。","立即向移民局报告死亡以取消VP(TE)和i-Kad。","通知工人大使馆并协助遗体回国——雇主承担此费用。","在7天内向DOSH报告。","联系Mercy Skills协助处理所有文件。"],cost:"遗体回国：RM 3,000-8,000，视国家而定。",warn:"未在7天内向DOSH报告将根据1994年职业安全与健康法受到处罚。",pitch:"Mercy Skills协助处理死亡后的文件、移民局取消手续和大使馆协调事宜。"},
"F6":{q:"工人未通过FOMEMA体检——现在怎么办？",honest:"未通过FOMEMA体检的工人必须被遣返。不会签发VP(TE)或i-Kad。雇主必须安排并支付工人回国费用。",s:["从诊所获取FOMEMA不合格通知。","立即在移民局申请出境备忘录（COM）。","购买回程机票——雇主承担此费用。","工人持COM离开马来西亚。","联系Mercy Skills进行替换——我们的合同包含FOMEMA不合格替换条款。"],cost:"回程机票：RM 500-1,500。替换：视代理条款而定。",warn:"扣留FOMEMA不合格工人或让其继续工作是严重的移民违规行为。",pitch:"Mercy Skills合同在保修期内包含FOMEMA不合格替换，无需额外代理费。"},
"F7":{q:"我想减少外籍工人——如何正确遣返他们？",honest:"您可以合法遣返工人，但有正确的程序。不当终止会使您面临就业法索赔。",s:["按照合同给予适当通知——最少4周或代通知金。","为每名工人在移民局申请出境备忘录（COM）。","通过ePPAx取消每名工人的VP(TE)——在终止30天内通知JTKSM。","购买回程机票——雇主承担遣返费用。","归还每名工人的护照和所有原始文件。","在出发前全额支付所有工资、加班费和福利。","让工人签署最终结算表格。"],cost:"回程机票：每名工人RM 500-2,000。",warn:"即使回国后，工人仍可提出工资或不当解雇索赔。确保所有款项已结清。",pitch:"Mercy Skills处理正确的遣返文件、COM申请和ePPAx取消手续。"},
"F8":{q:"工人想在准证到期前提前回国",honest:"工人可以提前回国，但必须正确取消准证，否则征费将继续产生。",s:["结清工人的所有欠薪、假期和津贴。","让工人签署自愿辞职或双方协议终止函。","在移民局申请出境备忘录（COM）。","通过ePPAx取消VP(TE)以停止征费。","归还工人的护照和所有文件。","购买回程机票——查阅合同确认由谁承担费用。","在终止后14天内通过ePPAx通知JTKSM。"],cost:"COM申请：名义费用。ePPAx取消：免费。机票：RM 500-1,500。",warn:"如果不取消VP(TE)，即使工人已离开马来西亚，征费也会继续收取。",pitch:"Mercy Skills处理VP(TE)取消、COM申请和所有ePPAx终止通知。"},
"F9":{q:"能否把曾被遣返的工人接回来？",honest:"被驱逐出境的工人已被列入黑名单。在黑名单期间，他们无法合法进入马来西亚。必须先申请撤销黑名单——没有保证的时间表。",s:["工人从马来西亚境外申请撤销黑名单——正式致函给移民局总监，普特拉贾亚。","信函必须包括：旧护照、新护照、驱逐令、详细说明、无后续违规证明。","处理时间：6个月至2年，无保证结果。","一旦黑名单被撤销，雇主可以开始新的VDR申请。","切勿尝试使用不同护照重新入境——生物识别系统无论使用何种护照都会检测到。","Mercy Skills可以就撤销黑名单信函提供建议。"],cost:"撤销黑名单：建议寻求法律协助。新VP(TE)：标准征费和代理费适用。",warn:"在被列入黑名单时使用不同护照尝试入境将面临额外的刑事指控。",pitch:"Mercy Skills就撤销黑名单流程提供建议，并在工人获得清除后管理新的招募工作。"},
"F10":{q:"我的女佣怀孕了——我有什么义务？",honest:"根据双边协议，雇主可以因怀孕终止合同——但必须支付所有欠薪并承担雇主费用遣返。",s:["安排FDH进行医学检查以确认怀孕。","全额支付所有欠薪。","在移民局申请出境备忘录（COM）。","购买回程机票——雇主承担此费用。","FDH不能继续留下工作——移民局不会为怀孕的FDH续期VP(TE)。","联系Mercy Skills进行替换。"],cost:"遣返机票：RM 800-1,500。所有欠薪必须全额支付。",warn:"在没有适当遣返的情况下遗弃怀孕FDH是严重的福利和法律违规。",pitch:"Mercy Skills处理此场景的遣返和替换流程。"},
"F11":{q:"我的女佣拒绝工作——我能怎么办？",honest:"FDH拒绝履行职责是违反合同的行为。您有权终止合同——但必须遵循正确的程序。",s:["书面记录每次事件——日期、时间、要求内容、拒绝内容。","发出正式口头警告，然后书面警告。给予合理时间改进。","如无改进：按合同条款发出终止通知。","在移民局申请COM并安排遣返。","在她出发前结清所有欠薪。","联系Mercy Skills——大多数合同包含基于表现的替换条款。"],cost:"遣返机票：RM 800-1,500。替换视代理条款而定。",warn:"体罚或没收护照是违法的，将对您导致刑事指控。",pitch:"Mercy Skills安置合同包含表现替换条款。"},
"F12":{q:"我已经有一个女佣——可以再请第二个吗？",honest:"大多数情况下，一个家庭只能有一名FDH。第二名FDH需要根据特定符合条件的情况获得特别批准。",s:["如果您符合以下条件，可以申请第二名FDH：您有4名或以上15岁以下的孩子，或者您/配偶患有严重疾病/残疾，或者您有需要全天候护理的年迈父母与您同住。","您的家庭收入必须满足更高的门槛。","通过州移民局提交申请并附上支持文件。","联系Mercy Skills评估资格并协助申请。"],cost:"第二名FDH适用标准安置费用。",warn:"未经批准引进第二名FDH意味着该FDH在马来西亚没有合法身份。",pitch:"Mercy Skills评估第二名FDH资格并管理完整的申请流程。"},
"F13":{q:"我是持有EP的外国人——可以雇用女佣吗？",honest:"是的，持有EP第I类或第II类的外国人可以在马来西亚雇用FDH。EP第III类持有者无资格。",s:["确认您持有EP第I类（月薪RM 10,000+）或第II类（RM 5,000-9,999）。","收入要求仍然适用：印尼FDH要求家庭收入RM 7,000/月，菲律宾RM 5,000。","需要通过ePPAx获取JTKSM预批准。","所有标准FDH程序适用——VDR、FOMEMA、PL(KS)。","联系Mercy Skills验证资格并开始申请。"],cost:"标准女佣安置费用：印尼RM 12,000-15,000，菲律宾RM 16,000-18,000。",warn:"EP第III类持有者无资格雇用家庭佣工。",pitch:"Mercy Skills为EP持有者处理FDH安置。"},
"F14":{q:"工人逾期逗留但害怕去移民局——该告诉他们什么？",honest:"自愿自首总是获得比被抓获更宽松的处理。等待越久，处罚越重。",s:["安抚工人：主动走进移民局显示诚意——移民局对自愿案例的处理远比逮捕案例宽松。","检查确切的逾期天数——如果90天或以下，支付罚款并获得特别准证。","携带护照和雇主信函前往最近的移民局。","当场支付罚款：RM 30/天（1-30天），统一RM 1,000（31-60天），统一RM 2,000（61-90天）。","超过90天：前往移民局执法部门——自愿仍比被逮捕处理更好。","Mercy Skills可以逐步指导雇主和工人完成自愿自首程序。"],cost:"罚款：RM 30/天（1-30天）| RM 1,000统一（31-60天）| RM 2,000统一（61-90天）。特别准证：RM 100-200。",warn:"每一天的躲避都会增加罚款和被拘留的风险。",pitch:"Mercy Skills逐步指导雇主完成自愿自首和续期流程。"},
"F15":{q:"工人在工作中受伤——我有什么责任？",honest:"您在SOCSO、就业法和职业安全与健康法下立即承担法律义务。所有外籍工人（FDH除外）必须在SOCSO注册。",s:["提供即时医疗救治——将工人送往SOCSO专属诊所或医院。","与工作相关的伤害的所有医疗费用由SOCSO承担。","在48小时内使用SOCSO 21表格向SOCSO举报，网址perkeso.gov.my。","如造成死亡或缺勤超过4天：还需在7天内向DOSH举报。","不要施压工人不举报伤情。","确保工人从第一天起就在SOCSO注册。"],cost:"如工人已正确注册，所有费用由SOCSO承担。如未注册：雇主承担100%的所有费用。",warn:"未能为外籍工人注册SOCSO意味着雇主个人承担所有伤害费用。",pitch:"Mercy Skills确保我们安置的每名工人从第一天起就在SOCSO注册。"},
"F16":{q:"能否将工人转移到不同行业？",honest:"是的——2025年起允许跨行业转移。必须通过ePPAx正式办理换雇主和行业更改手续。",s:["现任雇主通过ePPAx申请换雇主及行业更新。","新VP(TE)将反映新雇主名称和行业。","在新VP(TE)正式签发之前，工人不得在新行业开始工作。","征费率可能因新行业而变化。","联系Mercy Skills处理ePPAx换雇主申请。"],cost:"换雇主：新行业的标准征费自更改日起适用。",warn:"在签发新VP(TE)之前在新行业工作是刑事违规行为。",pitch:"Mercy Skills通过ePPAx管理换雇主和行业转移。"},
"F17":{q:"一名工人直接来找我要求雇用——不通过中介。这样可以吗？",honest:"直接雇用没有VDR的外籍工人意味着工人无法合法为您工作。雇主面临第55E条款的法律责任。",s:["在e-Patuh上使用工人的护照号码检查其当前移民身份。","如果工人在另一家雇主名下有有效VP(TE)——通过ePPAx申请换雇主。","如果工人持社交访问准证——他们不能为您工作。必须从原籍国重新开始VDR流程。","在没有以您公司名义签发的有效VP(TE)的情况下，切勿开始雇用。","联系Mercy Skills——我们可以评估状态并找到最快的合法途径。"],cost:"换雇主：标准征费。新VP(TE)：全额代理费和征费。",warn:"即使是临时雇用持社交访问准证的工人，根据第6(3)条款也是非法的。",pitch:"Mercy Skills可以快速评估上门工人的身份并找到最快的合法途径。"},
"F18":{q:"工人的护照快到期了——这会影响VP(TE)吗？",honest:"是的。如果工人的护照到期，其中的VP(TE)贴纸即使VP(TE)本身未到期也会失效。",s:["检查护照到期日——准证续期批准要求至少6个月有效期。","工人在马来西亚的本国大使馆申请护照续期。","新护照签发后，携带旧护照和新护照前往移民局转移背书。","如果VP(TE)也即将到期，通过ePPAx进行续期。","Mercy Skills协调护照转移和续期流程。"],cost:"大使馆护照续期：约RM 50-200。通过Mercy Skills的VP(TE)续期：RM 400-600。",warn:"护照已到期的工人即使VP(TE)从技术上尚未到期，也实际上是无证件人员。",pitch:"Mercy Skills追踪所有客户的护照和VP(TE)到期日，并在任一到期前90天提醒您。"},
"F19":{q:"印尼女佣价格太贵——可以议价吗？",honest:"通过持牌MRA安置印尼FDH的最高规定价格为RM 15,000全包。任何提供低于RM 10,000的人几乎肯定没有执照。",s:["了解费用涵盖的内容：搜寻来源、文件处理、VDR、FOMEMA、PL(KS)、保险——这是全面性的服务。","付款条款有帮助：Mercy Skills接受签约时50%押金，抵达时50%。","如果预算灵活，考虑菲律宾女佣——RM 16,000-18,000，通常非常可靠。","不要接触以RM 6,000-8,000提供印尼女佣的中介——几乎肯定是骗局。","在支付任何款项之前在jtksm.gov.my上验证任何中介。"],cost:"印尼FDH：通过持牌MRA最高RM 15,000全包。菲律宾：RM 16,000-18,000。",warn:"低于市场价的报价几乎总是导致工人无法交付或文件造假。",pitch:"Mercy Skills提供透明的全包价格，50/50付款条款，以及逃跑保证。"},
"F20":{q:"我的工人生病住院了——谁来付费？",honest:"工作相关疾病：如已在SOCSO注册，由SOCSO支付费用。非工作相关疾病：雇主在雇用期间负责。",s:["确定疾病是否与工作相关——这决定适用哪种保险。","工作相关：将工人送往SOCSO专属医院。在48小时内提交SOCSO索赔。","非工作相关：雇主根据就业法承担医疗费用。","对于FDH：SKHPPA医疗保险涵盖每年最高RM 20,000的住院费用。","雇主仍须在合同规定的期限内在住院期间支付工资。"],cost:"SOCSO承担工作相关费用（若已注册）。非工作相关：雇主支付。FDH SKHPPA：每年最高RM 20,000。",warn:"如果未进行SOCSO注册，雇主个人承担100%所有医疗费用。",pitch:"Mercy Skills确保所有工人从第一天起受SOCSO保障，FDH有活跃的SKHPPA保险。"},
"F21":{q:"雇主威胁要驱逐我如果我投诉——我该怎么做？",honest:"这是非法恐吓。您的雇主没有权力驱逐您——只有马来西亚移民局才能这样做，而且必须经过正当程序。",s:["了解您的权利：您的雇主不能驱逐您。只有移民局才能。","如果您的准证有效，您在马来西亚是合法的，受马来西亚劳工法律保护。","记录威胁：准确记录所说的内容、时间和任何目击者。","通过03-8000 8000或eAduan JTKSM应用向JTKSM举报。","联系您本国的大使馆寻求领事保护。","如果您是MyShield会员：致电您的保护官员——他们将代表您直接联系雇主。","如果您认为您受到控制或被贩卖，致电TIP热线15000。"],cost:"举报无需费用。",warn:"马来西亚法律保护提出合理投诉的工人免受报复。",pitch:"MyShield每月RM 20——您的专属官员代表您与雇主沟通。"},
"F22":{q:"我的合同说工资RM 1,800但雇主只支付RM 1,200",honest:"这是对您就业合同的明显违反。您有权获得合同中规定的工资。",s:["收集证据：签署的合同、所有银行对账单、工资单、WhatsApp消息。","计算每个少付月份的总短缺金额。","通过挂号信向雇主发送正式催款函——注明欠款总额及7天截止日期。","通过eAduan JTKSM应用或到最近的JTKSM办公室当面提交投诉。","JTKSM进行调解。劳工法庭可判决最高RM 50,000。","如果是MyShield会员：官员在24小时内正式联系雇主。"],cost:"JTKSM投诉：免费。劳工法庭申索：免费。",warn:"在每次少付后60天内提交投诉。",pitch:"MyShield会员获得即时行动——官员在24小时内联系雇主。每月RM 20。"},
"F23":{q:"我想换雇主但老板不肯放我走",honest:"您的雇主不能合法强留您。VP(TE)要求现任雇主通过ePPAx申请换雇主——但如果他们无正当理由拒绝，JTKSM可以强制他们配合。",s:["您不能简单地开始为别人工作——VP(TE)绑定于现任雇主。","以书面形式向现任雇主要求换雇主——电子邮件或WhatsApp以留存记录。","如果雇主无正当理由拒绝：向JTKSM举报，致电03-8000 8000。","如果雇主还扣押您的护照：同时向警察（999）和JTKSM举报。","如果存在威胁、虐待或强迫劳动：立即致电TIP热线15000。","一旦雇主配合：通过ePPAx的换雇主程序正常进行。"],cost:"向JTKSM举报无需费用。换雇主：标准征费适用。",warn:"不要离开现任雇主并开始在其他地方工作——这会为您和新雇主创造刑事责任。",pitch:"MyShield官员代表工人直接与雇主进行调解。每月RM 20。"},
"F24":{q:"雇主不给我休息日——这合法吗？",honest:"不——这是非法的。根据1955年就业法，包括外籍工人在内的所有雇员每周至少有一天休息日。",s:["记录每个没有休息日的工作日——日期很重要。","以书面形式（WhatsApp可作为证据）通知雇主要求您合法的休息日。","如果雇主拒绝：通过eAduan JTKSM应用提交投诉。","对于FDH：同样的权利适用于就业法和双边协议。","如果您在休息日工作，雇主必须在月薪之外额外支付按比例计算的日薪。","如果您是MyShield会员：官员联系雇主并引用具体的法律规定。"],cost:"举报无需费用。",warn:"经常拒绝提供休息日的雇主面临就业法下的罚款。",pitch:"MyShield每月RM 20——官员直接在您与雇主之间执行您的权利。"},
"F25":{q:"雇主未经通知就从我的工资中扣款",honest:"未经事先书面同意或合法依据的工资扣款根据1955年就业法第24条款是非法的。",s:["查阅雇佣合同，了解签约时书面同意的扣款内容。","非法扣款包括：未事先约定的食宿费、招聘债务、合同中未规定的罚款扣款。","向雇主书面请求对每项扣款的书面说明和明细。","如果没有有效解释：通过eAduan应用在JTKSM提出投诉。","JTKSM可命令雇主偿还所有非法扣款。","如果扣款是为了招聘债务——这是贩卖人口的指标。联系TIP 15000。"],cost:"JTKSM投诉：免费。",warn:"从工资中扣除招聘费用是债务奴役和贩卖人口的重大危险信号。",pitch:"MyShield官员处理工资纠纷案例，包括非法扣款。每月RM 20。"},
"B1":{q:"Mercy Skills \u2014 外籍工人供应 VP(TE)",s:["端对端外籍工人安置，持有VP(TE)。","行业：制造、建筑、种植、农业、服务、采矿。","来源国：印度尼西亚、孟加拉国、尼泊尔、缅甸、印度、菲律宾、越南、柬埔寨、巴基斯坦、斯里兰卡。","我们处理：第60K条款、配额、VDR、征费、FOMEMA、VP(TE)、i-Kad。","付款：签约时50%押金，抵达时50%。"],cost:"政府征费：RM 1,850/年（制造业）| RM 640/年（种植业）。代理服务费：按案例报价。",warn:"必须先完成30天MYFutureJobs发布和第60K条款批准。"},
"B2":{q:"Mercy Skills \u2014 女佣和FDH供应与安置",s:["从来源到交付的全套女佣安置服务。","印尼FDH：RM 12,000-15,000全包。最低工资RM 1,500/月。","菲律宾FDH：RM 16,000-18,000全包。最低工资RM 1,800/月。","包含：JTKSM预批准、VDR、保险、FOMEMA、PL(KS)。","付款：50%押金，抵达时50%。3-6个月逃跑保证。"],cost:"印尼：RM 12,000-15,000。菲律宾：RM 16,000-18,000。征费：豁免。",warn:"政府费用（FOMEMA、移民局费用、个人债券）单独由雇主支付。"},
"B3":{q:"Mercy Skills \u2014 所有类型工作准证续期",s:["所有类型全面续期：VP(TE)、FDH、PVP持有者。","我们处理：FOMEMA、ePPAx、征费、移民局、准证贴纸归还。","到期前90天自动提醒。5名工人以上享团体优惠。"],cost:"每名工人RM 400-600。女佣：RM 1,500-2,500。政府征费单独支付。",warn:"晚一天工人就成非法人员。每名工人罚款RM 5,000-30,000。"},
"B4":{q:"Mercy Skills \u2014 ESD和就业准证EP服务",s:["ESD公司注册（一次性）：RM 2,000-3,000。","EP第I类（月薪RM 10K+）：RM 3,000-5,000。EP第II类（RM 5K-9,999）：RM 2,000-3,500。EP第III类（RM 3K-4,999）：RM 1,500-2,500。","EP续期：RM 1,000-2,000。PVP（最长12个月）：RM 1,500-2,500。","付款：50%预付，提交时50%。"],cost:"ESD注册：RM 2,000-3,000。政府EP费用RM 2,160由雇主单独支付。",warn:"2026年起CGC为强制性要求——额外预留2-4周时间。"},
"B5":{q:"Mercy Skills \u2014 本地马来西亚工人招聘",s:["端对端马来西亚人才安置，覆盖所有行业。","我们发布广告、筛选简历、列出候选名单——您只需见最优秀的3-5名候选人。","目标：餐饮业、制造、零售、物流。Joey会说普通话——对华人餐厅的关键优势。","费用：一个月的总薪酬。无成功安置=无费用。30天免费替换保证。"],cost:"服务费：一个月的总薪酬。签约时收50%预付金。",warn:"无论结果如何，预付金在签约时支付。"},
"B6":{q:"MyShield \u2014 外籍工人保护会员（每月RM 20）",s:["面向马来西亚所有外籍工人的独立工人保护会员平台。","固定每月RM 20——无隐藏费用，无案例费用。","会员获得：专属保护官员、工资纠纷解决、护照追回、虐待应对、24小时SOS紧急服务、文件库。","通过Telegram加入。热线：+60199888720。归属于Nikko Group Sdn Bhd。"],cost:"所有外籍工人每月固定RM 20。年度计划：RM 200。",warn:"B2C——工人自行注册和付费。非雇主资助。",pitch:"花不到一顿饭的钱，工人就能获得一名全天候为其权益奋斗的专属官员。"},
"B7":{q:"MyWakil \u2014 马来西亚工人职业保护",s:["马来西亚首个面向本地工人的个人职业经纪平台。","3个级别：学生（零EPF）每月RM 10 | 失业RM 17 | 就业基本工资的1%（最低RM 17）。","会员获得：专属职业官员、雇主代理、工作搜寻、合同审查、每年2次免费心理健康咨询。","应用程序开发中。隶属于Mercy Skills Consultancy JTKSM 928。"],cost:"学生：每月RM 10。失业：每月RM 17。就业：基本工资的1%（最低RM 17）。",warn:"MyWakil仅适用于马来西亚工人。外籍工人请使用MyShield。",pitch:"当马来西亚工人来电咨询工作问题时——MyWakil为他们提供专属官员，每月仅需RM 10起。"},
"B8":{q:"MyDestinasi \u2014 个人职业蓝图计划",s:["个人职业蓝图计划捆绑在每个MyWakil会员资格中——无需额外费用。","任何拥有任何职业梦想的马来西亚人都可获得完整的个人职业蓝图。","包含：与官员的梦想会谈、每6个月的检查会谈、首次方向正确的工作安置。","从MyWakil会员资格的第1天起自动激活。"],cost:"包含在MyWakil会员资格中——无额外费用。",warn:"MyDestinasi不是独立产品。仅捆绑在MyWakil内。",pitch:"如果有人不知道该怎么发展职业——MyDestinasi将他们的梦想转化为真实的逐步计划。"},
"C1":{q:"开场电话脚本——外籍工人（普通话）",s:["说: 你好，请问老板或负责人事的人在吗？","说: 我叫 [Name]，来自 Mercy Skills Consultancy，牌照 JTKSM 928。","说: 我们专门为雪隆地区的制造业和服务业公司提供合法外劳招聘服务。","问: 请问贵公司目前有多少名外劳？","说: 未来 3-6 个月有没有准证需要续期？我们负责所有 ePPAx、FOMEMA 及移民局事宜。","结束: 我可以把服务清单和收费发到您的 WhatsApp 吗？只需 2 分钟查看。"]},
"C2":{q:"开场电话脚本——外籍工人（英语）",s:["说: Good morning, may I speak with the person handling HR or workers?","说: My name is [Name] from Mercy Skills Consultancy — licensed agency JTKSM 928.","问: How many foreign workers does your company currently have?","说: Are any permits expiring in the next 3-6 months? We handle all ePPAx, FOMEMA, and Immigration.","结束: May I send you our service list on WhatsApp right now?"]},
"C3":{q:"开场电话脚本——马来语",s:["说: Selamat pagi, boleh saya bercakap dengan tuan atau puan yang uruskan pekerja atau HR?","说: Nama saya [Name], dari Mercy Skills Consultancy — agensi berlesen JTKSM 928.","问: Berapa ramai pekerja asing syarikat kini ada?","说: Ada permit yang akan tamat dalam 3-6 bulan? Kami uruskan semua ePPAx, FOMEMA, dan Imigresen.","结束: Boleh saya hantarkan senarai perkhidmatan melalui WhatsApp sekarang?"]},
"C4":{q:"女佣安置推销话术",s:["说: 早上好，我来自Mercy Skills Consultancy——持牌女佣中介JTKSM 928。","问: 您是在寻找家庭佣工，还是您现有的女佣准证快到期了？","说: 我们提供印尼女佣，全包价从RM 12,000起，菲律宾从RM 16,000起——所有文件由我们处理。","说: 我们的合同包含3-6个月的逃跑保证。","结束: 我现在可以把我们的女佣服务资料发到您的WhatsApp吗？"],cost:"印尼：RM 12,000-15,000。菲律宾：RM 16,000-18,000。"},
"C5":{q:"准证续期推销话术",s:["说: 您好 [Name]，快速确认——您的工人有任何准证在3个月内到期吗？","说: 逾期续期意味着每名工人罚款RM 5,000-30,000。","说: 从每名工人RM 400起——我们预约FOMEMA、提交ePPAx、协调移民局、将新贴纸归还给您。","结束: 我现在可以核查您的到期日并给您一个快速报价吗？"],cost:"每名工人RM 400-600。女佣续期：RM 1,500-2,500。"},
"C6":{q:"EP和ESD推销话术",s:["说: 早上好，我来自Mercy Skills——我们处理为聘用外籍专业人士的公司申办ESD就业准证。","问: 您有外籍员工，或者计划聘用月薪RM 3,000以上的外籍专业人士吗？","说: 我们处理完整的ESD门户注册和EP申请。","结束: 我现在可以把EP服务指南发到您的WhatsApp吗？"],cost:"ESD：RM 2,000-3,000。EP第I类：RM 3,000-5,000。第II类：RM 2,000-3,500。第III类：RM 1,500-2,500。"},
"C7":{q:"反对意见：我们自己管理工人",s:["回应: 非常好——我们许多最优秀的客户也自行管理团队。","说: 我们面向自行管理公司最受欢迎的服务是准证续期——每名工人仅需RM 400起，您的HR团队完全解放。","问: 您追踪了所有工人的准证到期日吗？我们现在可以免费检查。"]},
"C8":{q:"反对意见：太贵了或没有预算",s:["回应: 政府征费每名工人每年RM 1,850，无论您使用哪家服务都是固定的。","说: 我们的服务费仅从每次续期RM 400起。","说: 一次逾期续期罚款是RM 5,000-30,000。那足够支付10年以上的我们的服务费了。"]},
"C9":{q:"反对意见：时机不对或太忙",s:["回应: 完全理解——什么时候是更好的回电时间？","说: 只是提醒一下：如果我们等待期间有任何准证到期，罚款会在到期日当天立即开始。","提议: 我可以现在检查您的工人到期日——只需2分钟，完全免费。"]},
"C10":{q:"反对意见：已经有其他中介或供应商",s:["回应: 没问题——已经在与人合作很好。","问: 您目前的中介持有JTKSM执照吗？只是确保您的公司有完整的法律保障。","说: 如果您需要备用，Mercy Skills JTKSM 928随时为您服务。","结束: 我可以把我们的服务对比发到您的WhatsApp吗？完全没有承诺。"]}

"A1":{q:"தொழிலாளர் அதிகமாக தங்கியிருக்கிறார் அல்லது பாஸ் காலாவதி",s:["பாஸ் காலாவதி தேதியிலிருந்து இன்று வரை சரியான நாட்களை கணக்கிடுங்கள்.","1-30 நாட்கள்: மிக அருகிலுள்ள குடியேற்றம் அலுவலகத்தில் தினசரி RM 30 கட்டணம்.","31-60 நாட்கள்: RM 1,000 தட்டையான கட்டணம்.","61-90 நாட்கள்: RM 2,000 தட்டையான கட்டணம்.","90 நாட்களுக்கு மேல்: அமலாக்க பிரிவில் தன்னார்வமாக சரண் அடையுங்கள்.","Special Pass (RM 100-200) அதே நாளில் விண்ணப்பிக்கவும்."],cost:"தண்டம்: RM 30/நாள் (1-30) | RM 1,000 தட்டை (31-60) | RM 2,000 தட்டை (61-90).",warn:"90 நாட்களுக்கு மேல்: தடுப்பு, விசாரணை, நாடு கடத்தல், கருப்பு பட்டியல் ஆபத்து.",pitch:"Mercy Skills VP(TE) புதுப்பிக்கும் சேவை காலாவதிக்கு 90 நாட்கள் முன்பே தொடங்குகிறது."},
"A2":{q:"வெளிநாட்டு தொழிலாளர்களை சட்டப்பூர்வமாக எப்படி நியமிப்பது",s:["ePPAx மூலம் Section 60K ஒப்புதல் பெறுங்கள்.","MYFutureJobs இல் 30 நாட்கள் தொழில் இடம் இடுங்கள்.","OSC மூலம் ஒதுக்கீடு விண்ணப்பிக்கவும்.","JTKSM உரிம நிறுவனத்தை நியமிக்கவும்.","30 நாட்களில் FOMEMA மருத்துவம்.","FOMEMA தேர்ச்சிக்கு பிறகு VP(TE) மற்றும் i-Kad."],cost:"அரசு வரி: RM 1,850/ஆண்டு (manufacturing) | RM 640/ஆண்டு (plantation).",warn:"உரிமையற்ற இடைத்தரகர்கள் மூலம்: முதலாளி முழு பொறுப்பு. RM 5,000-30,000.",pitch:"Mercy Skills JTKSM 928 முழு செயல்முறையையும் கையாளுகிறது."},
"A3":{q:"முதலாளி சட்டவிரோத தொழிலாளர்களுடன் பிடிக்கப்பட்டார்",s:["அனைத்து சட்டவிரோத தொழிலாளர்களையும் உடனடியாக நிறுத்துங்கள்.","e-Patuh மூலம் சரிபாருங்கள்.","SISPAA க்கு தன்னார்வமாக அறிவிக்கவும்.","Mercy Skills உடனடியாக தொடர்பு கொள்ளுங்கள்.","14 நாட்களில் JTKSM க்கு தெரிவிக்கவும்."],cost:"அபராதம்: RM 5,000-30,000 ஒவ்வொரு தொழிலாளருக்கும்.",warn:"அறியாமை பிரிவு 55E இல் இது எதிர்முக வாதம் இல்லை.",pitch:"Mercy Skills பயன்படுத்தும்போது இது நடக்காது."},
"A4":{q:"பாஸ் புதுப்பித்தல் — VP(TE) அல்லது EP காலாவதியாகிறது",s:["90 நாட்களில் காலாவதியானால் இப்போதே தொடங்குங்கள்.","VP(TE): ePPAx மூலம் புதுப்பிக்கவும். FOMEMA ஏற்பாடு (RM 180-250).","வரி: RM 1,850 (manufacturing) அல்லது RM 640 (plantation).","EP: Xpats Gateway மூலம். RM 2,160 செலுத்துங்கள். 6-8 வாரம்.","Mercy Skills அழையுங்கள் — RM 400 முதல் ஒவ்வொரு தொழிலாளருக்கும்."],cost:"Mercy Skills புதுப்பித்தல்: RM 400-600 ஒவ்வொரு தொழிலாளருக்கும்.",warn:"தாமத புதுப்பித்தல் என்றால் காலாவதி நாளில் தொழிலாளர் சட்டவிரோதமானார்.",pitch:"Mercy Skills 90 நாட்கள் முன்பே நினைவூட்டல் அனுப்புகிறது."},
"A5":{q:"வீட்டு உதவியாளர் நியமிக்க விரும்புகிறீர்கள்",s:["முதலாளி: மலேசியர்/PR/EP Cat I அல்லது II, வயது 21+.","JTKSM முன் அனுமதி ePPAx மூலம்.","Mercy Skills தொடர்பு கொள்ளுங்கள்.","இஸ்லாமிய முதலாளிகள் இஸ்லாமிய FDH மட்டுமே நியமிக்க வேண்டும். ஒரு வீட்டில் ஒரு FDH மட்டுமே."],cost:"இந்தோனேசியா: RM 12,000-15,000. பிலிப்பைன்ஸ்: RM 16,000-18,000. வரி: விலக்கு.",warn:"உரிமையற்ற நிறுவனங்கள் மிக பொதுவாக மோசடி நடத்துகின்றன.",pitch:"Mercy Skills முழு FDH தொடக்கம் RM 12,000 முதல். 3-6 மாத உத்தரவாதம்."},
"A6":{q:"வீட்டு உதவியாளர் ஓடிப்போனார்",s:["24 மணி நேரத்தில் காவல் நிலையத்தில் புகார் கொடுங்கள்.","Immigration அலுவலகத்தில் PL(KS) ரத்து செய்யுங்கள்.","Mercy Skills உத்தரவாத ஒப்பந்தத்தை சரிபாருங்கள்."],cost:"சரியாக தெரிவிக்காவிட்டால் தனிப்பட்ட பத்திரம் பறிமுதல்.",warn:"24 மணி நேரத்தில் தெரிவிக்கவும்.",pitch:"Mercy Skills ஒப்பந்துகள் 3-6 மாத உத்தரவாதம் கொண்டிருக்கின்றன."},
"A7":{q:"தொழிலாளர் சம்பளம் செலுத்தப்படவில்லை அல்லது தாமதமாகிறது",s:["ஆதாரங்களை சேகரிக்கவும்: வங்கி மெய்ச்சேர்க்கை, சம்பள சீட்டு, ஒப்பந்தம்.","முதலாளிக்கு கடிதம் மூலம் Demand Letter அனுப்புங்கள்.","eAduan JTKSM மூலம் முகார் கொடுங்கள்.","JTKSM மூலம் நீதி Labour Court Section 69 — RM 50,000 வரை."],cost:"JTKSM முகார்: இலவசம். Labour Court: இலவசம்.",warn:"தப்பு நடந்த 60 நாட்களில் முகார் கொடுங்கள்.",pitch:"MyShield உறுப்பினர்கள் (RM 20/மாதம்) உடனடி உதவி பெறுகிறார்கள்."},
"A8":{q:"முதலாளி தொழிலாளர் கடவுச்சீட்டை தடுத்து வைக்கிறார்",s:["Passports Act 1966 Section 12(1)(f) இல் குற்றம்.","காவல் நிலையத்தில் புகார் மற்றும் Immigration இல் தனியாக புகார்.","JTKSM 03-8000 8000 மற்றும் TIP 15000 அழையுங்கள்.","ATIPSOM பாதுகாப்பு பொருந்தும்."],cost:"தெரிவிக்க செலவில்லை.",warn:"தொழிலாளர்கள் எப்போதும் தங்கள் கடவுச்சீட்டை வைத்திருக்க வேண்டும்.",pitch:"Mercy Skills ஒப்பந்துகள் கடவுச்சீட்டு வைத்திருக்கும் கட்டாய நிபந்தனை கொண்டிருக்கின்றன."},
"A9":{q:"வெளிநாட்டவருக்கு Employment Pass (EP) விண்ணப்பம்",s:["ESD portal esd.imi.gov.my இல் பதிவு செய்யுங்கள்.","Xpats Gateway மூலம் சமர்ப்பிக்கவும். RM 2,160 செலுத்துங்கள்.","6-8 வாரம் (Cat I/II), 8-12 வாரம் (Cat III)."],cost:"அரசு கட்டணம்: RM 2,160. Mercy Skills: Cat I RM 3,000-5,000 | Cat II RM 2,000-3,500 | Cat III RM 1,500-2,500.",warn:"2026 முதல் CGC கட்டாயம்.",pitch:"Mercy Skills முழு ESD பதிவு மற்றும் EP விண்ணப்பம் கையாளுகிறது."},
"A10":{q:"வீட்டு உதவியாளர் நிறுவனம் மோசடி அல்லது திரும்ப கொடுக்கவில்லை",s:["ஆதாரங்களை சேகரிக்கவும்.","Registered Post மூலம் Demand Letter அனுப்புங்கள்.","eAduan JTKSM தாக்கல் செய்யுங்கள்.","TTPM (ttpm.gov.my) இலும் தாக்கல் செய்யுங்கள் — RM 50,000 வரை, RM 5 கட்டணம்."],cost:"TTPM தாக்கல்: RM 5. RM 50,000 வரை திரும்ப பெறலாம்.",warn:"JTKSM மற்றும் TTPM இரண்டையும் ஒரே நேரத்தில் தாக்கல் செய்யுங்கள்.",pitch:"Mercy Skills JTKSM 928 உரிம பெற்றது. எழுதப்பட்ட ஒப்பந்தம்."},
"A11":{q:"வீட்டு உதவியாளர் முதலாளியால் துன்புறுத்தப்படுகிறார்",s:["FDH நேரடியாக காவல் நிலையம் செல்லவும்.","புகார் கொடுங்கள்.","Indonesian Embassy 03-4253 2100 அல்லது Philippine Embassy 03-2148 4233.","JTKSM 03-8000 8000 அழையுங்கள்."],cost:"தெரிவிக்க செலவில்லை.",warn:"முகார் செயலில் இருக்கும்போது FDH முதலாளியிடம் திரும்ப வரவேண்டாம்.",pitch:"இதற்காகவே MyShield உள்ளது — RM 20/மாதம், அர்ப்பணிக்கப்பட்ட அதிகாரி 24/7."},
"A12":{q:"மனித கடத்தல் அல்லது கட்டாய உழைப்பு",s:["TIP Hotline 15000 உடனடியாக அழையுங்கள் — 24 மணி நேரம், அனாமதேயம்.","ATIPSOM: பாதிக்கப்பட்டவர் குடியேற்றம் குற்றங்களுக்கு குற்றஞ்சாட்டப்பட மாட்டார்.","JTKSM மற்றும் காவல் (999) க்கு ஒரே நேரத்தில் அறிவிக்கவும்."],cost:"தெரிவிக்க செலவில்லை. கடத்துபவர்: 3-20 ஆண்டு சிறை.",warn:"பாதிக்கப்பட்டவர்கள் முழுமையாக பாதுகாக்கப்படுகிறார்கள்.",pitch:"Mercy Skills தொடக்கங்கள் கடவுச்சீட்டு வைத்திருக்கும் கட்டாய நிபந்தனை கொண்டிருக்கின்றன."},
"A13":{q:"தொழிலாளர் முதலாளியை மாற்ற விரும்புகிறார்",s:["VP(TE): தற்போதைய முதலாளி ePPAx மூலம் Change of Employer விண்ணப்பிக்கவும்.","புதிய VP(TE) வழங்கப்படும் வரை புதிய முதலாளியிடம் வேலை தொடங்காதீர்கள்.","EP: தற்போதைய EP ரத்து. புதிய முதலாளி புதிய EP (RM 2,160) விண்ணப்பிக்கவும்."],cost:"Change of Employer: நிலையான வரி.",warn:"புதிய பாஸ் வழங்கப்படும் முன்பு வேலை செய்வது குற்றம்.",pitch:"Mercy Skills ePPAx மூலம் Change of Employer கையாளுகிறது."},
"A14":{q:"மாணவர் பாஸ் பகுதி நேர வேலை விதிகள்",s:["UA அல்லது IPTS மாணவர்கள் மட்டுமே.","இடைவேளை நேரங்களில் மட்டுமே வேலை.","4 துறைகள் மட்டுமே: உணவகம், ஹோட்டல், பெட்ரோல் கியோஸ்க், மினி மார்க்கெட். வாரம் 20 மணி நேரம் அதிகபட்சம்."],cost:"ஒப்புதல்: இலவசம். மாணவர் பாஸ்: RM 60/ஆண்டு.",warn:"செயலில் இருக்கும் கல்வி பருவத்தில் வேலை சட்டவிரோதம்.",pitch:"MyWakil மாணவர் உறுப்பினர் RM 10/மாதம்."},
"A15":{q:"புகார் தாக்கல் செய்வது எப்படி — பொது வழிகாட்டி",s:["குடியேற்றம் குற்றங்கள்: SISPAA imi.spab.gov.my அல்லது 03-8000 8000.","தொழிலாளர் தகராறுகள்: eAduan JTKSM.","கடத்தல்: TIP 15000 — 24 மணி நேரம், அனாமதேயம்.","ஊழல் அதிகாரிகள்: MACC 1-800-88-6000.","நிறுவன மீறல்: TTPM ttpm.gov.my — RM 5, RM 50,000 வரை.","அவசரநிலை: காவல் 999."],cost:"TTPM (RM 5) தவிர அனைத்தும் இலவசம்.",warn:"தன்னார்வ அறிவிப்பு எப்போதும் மிகவும் சுலபமான நடத்தையில் முடியும்.",pitch:"Mercy Skills வாடிக்கையாளர்கள் நேரடி வழிகாட்டல் பெறுகிறார்கள்."},
"F1":{q:"எனக்கு தொழிலாளர்கள் இருக்கிறார்கள் ஆனால் பாஸ் இல்லை — இப்போது பாஸ் பெற முடியுமா?",honest:"ஆம், VP(TE) விண்ணப்பிக்கலாம் — ஆனால் தொழிலாளர்கள் அதிகாரப்பூர்வ நுழைவு புள்ளிகள் மூலம் சட்டப்பூர்வமாக நுழைந்திருந்தால் மட்டுமே. சட்டவிரோதமாக நுழைந்தவர்களை மலேசியாவில் சட்டப்பூர்வமாக்க முடியாது.",s:["சரிபாருங்கள்: தொழிலாளர்கள் அதிகாரப்பூர்வ நுழைவு புள்ளிகள் மூலம் நுழைந்தார்களா?","சட்டப்பூர்வமாக நுழைந்தவர்களுக்கு Special Pass (RM 100-200 ஒவ்வொருவருக்கும்) விண்ணப்பிக்கவும்.","முதலாளி ePPAx மூலம் Section 60K ஒப்புதல் விண்ணப்பிக்கவும்.","MYFutureJobs 30 நாட்கள், பிறகு OSC இல் ஒதுக்கீடு விண்ணப்பம்.","VDR, FOMEMA, வரி, VP(TE) க்கு Mercy Skills (JTKSM 928) தொடர்பு கொள்ளுங்கள்."],cost:"Special Pass: RM 100-200 ஒவ்வொரு தொழிலாளருக்கும்.",warn:"சரியான பாஸ் இல்லாத தொழிலாளர்கள் முதலாளிக்கு RM 5,000-30,000 அபராதம்.",pitch:"Mercy Skills இந்த நிலைமையை கையாளுகிறது. இன்றே அழையுங்கள்."},
"F2":{q:"என் தொழிலாளர்களின் பாஸ் 2 மாதம் முன்பே காலாவதியானது — என்னவாகும்?",honest:"உங்கள் தொழிலாளர்கள் 2 மாதமாக சட்டவிரோதமாக இருக்கிறார்கள். RM 5,000-30,000 அபராதம் உள்ளது. உடனடியாக செயல்படுங்கள்.",s:["உடனடியாக வேலையை நிறுத்துங்கள்.","e-Patuh மூலம் சரிபாருங்கள்.","RM 1,000 தட்டை கட்டணம் செலுத்துங்கள்.","Special Pass விண்ணப்பிக்கவும்.","Mercy Skills அழையுங்கள் — 24 மணி நேரத்தில் தொடங்கலாம்."],cost:"அதிக தங்கல் கட்டணம்: RM 1,000 ஒவ்வொரு தொழிலாளருக்கும்.",warn:"ஒவ்வொரு கூடுதல் நாளும் உங்கள் சட்ட ஆபத்தை அதிகரிக்கிறது.",pitch:"Mercy Skills அவசர பாஸ் புதுப்பித்தல் கையாளுகிறது."},
"F14":{q:"தொழிலாளர் அதிகமாக தங்கி Immigration க்கு செல்ல பயப்படுகிறார்",honest:"தன்னார்வ சரண் எப்போதும் மிகவும் சுலபமான நடத்தையில் முடியும். காத்திருக்கும்போது, தண்டம் அதிகரிக்கும்.",s:["தொழிலாளரை உறுதிப்படுத்துங்கள்: தன்னார்வமாக செல்வது நல்ல விருப்பம்.","சரியான நாட்களை சரிபாருங்கள்.","கடவுச்சீட்டு மற்றும் முதலாளி கடிதம் கொண்டு Immigration அலுவலகத்திற்கு செல்லுங்கள்.","கட்டணம் செலுத்துங்கள்: RM 30/நாள் (1-30), RM 1,000 (31-60), RM 2,000 (61-90)."],cost:"கட்டணம்: RM 30/நாள் (1-30) | RM 1,000 (31-60) | RM 2,000 (61-90). Special Pass: RM 100-200.",warn:"ஒவ்வொரு கூடுதல் நாளும் தண்டம் மற்றும் தடுப்பு ஆபத்தை அதிகரிக்கிறது.",pitch:"Mercy Skills தன்னார்வ சரண் செயல்முறையில் வழிகாட்டுகிறது."},
"F21":{q:"முதலாளி புகார் செய்தால் நாட்டிலிருந்து அனுப்புவேன் என்று மிரட்டுகிறார்",honest:"இது சட்டவிரோத மிரட்டல். உங்கள் முதலாளிக்கு உங்களை நாட்டிலிருந்து அனுப்ப அதிகாரம் இல்லை — மலேசிய Immigration துறை மட்டுமே அப்படி செய்யலாம்.",s:["உங்கள் உரிமைகளை அறிந்துக்கொள்ளுங்கள்.","மிரட்டலை பதிவு செய்யுங்கள்.","JTKSM க்கு 03-8000 8000 அல்லது eAduan மூலம் தெரிவிக்கவும்.","உங்கள் நாட்டு தூதரகத்தை தொடர்பு கொள்ளுங்கள்.","MyShield உறுப்பினரானால்: உங்கள் பாதுகாப்பு அதிகாரியை அழையுங்கள்."],cost:"தெரிவிக்க செலவில்லை.",warn:"மலேசிய சட்டம் சட்டப்பூர்வ புகார்களை செய்யும் தொழிலாளர்களை பாதுகாக்கிறது.",pitch:"MyShield RM 20/மாதம் — உங்கள் அதிகாரி உங்களுக்காக முதலாளியிடம் பேசுகிறார்."},
