function getT(id,lang,field){
  var maps={bm:TR_BM,zh:TR_ZH,ta:TR_TA};
  var tr=maps[lang];
  if(!tr||!tr[id])return null;
  return tr[id][field]||null;
}

function lev(a,b){
  if(!a)return b.length;if(!b)return a.length;
  var m=[],i,j;
  for(i=0;i<=b.length;i++)m[i]=[i];
  for(j=0;j<=a.length;j++)m[0][j]=j;
  for(i=1;i<=b.length;i++)for(j=1;j<=a.length;j++)
    m[i][j]=b[i-1]===a[j-1]?m[i-1][j-1]:1+Math.min(m[i-1][j-1],m[i][j-1],m[i-1][j]);
  return m[b.length][a.length];
}

function scoreCard(card,q){
  if(!q)return 1;
  var ql=q.toLowerCase();
  var kw=(card.k||'').toLowerCase();
  var title=(card.q||'').toLowerCase();
  var steps=(card.s||[]).join(' ').toLowerCase();
  var full=kw+' '+title+' '+steps;
  var score=0;
  var words=ql.split(/\s+/).filter(function(w){return w.length>1;});
  words.forEach(function(w){
    if(kw.indexOf(w)>=0)score+=10;
    else if(title.indexOf(w)>=0)score+=6;
    else if(steps.indexOf(w)>=0)score+=3;
    else{
      var parts=kw.split(' ');
      parts.forEach(function(p){
        var d=lev(w,p);
        if(d<=2)score+=5-d;
      });
    }
  });
  return score;
}

function render(){
  var u=UI[lang];
  document.getElementById('root').innerHTML='<div class="hdr"><div class="hdr-l"><div class="ht">'+escH(u.h)+'</div><div class="hs">'+escH(u.s)+'</div></div><div class="hdr-r"><span class="pill">'+escH(currentUser.name)+'</span>'+(currentUser.role==='admin'?'<button class="hbtn" onclick="toggleAdmin()">Admin</button>':'')+(currentUser.role==='admin'?'<button class="hbtn" onclick="toggleReport()">Reports</button>':'')+ '<button class="hbtn" onclick="doLogout()">Logout</button></div></div>'+(showAdmin?renderAdmin():'')+(showReport?renderReport():'')+'<div class="lang-row">'+LKEYS.map(function(k,i){return '<button class="'+(lang===k?'on':'')+'" onclick="setLang(\''+k+'\')">'+LLBLS[i]+'</button>';}).join('')+'</div><div class="tabs">'+TLBLS[lang].map(function(t,i){return '<button class="'+(mode===i?'on':'')+'" onclick="setMode('+i+')">'+escH(t)+'</button>';}).join('')+'</div><div class="sw"><span class="si">&#128269;</span><input id="srch" type="text" placeholder="'+escH(u.p)+'" oninput="doSearch(this.value)"></div><div class="cats" id="catrow"></div><div class="mc" id="mc"></div><div class="results" id="results"></div>';
  // Tiled canvas watermark - dense and visible
  var wm=document.getElementById('wm');
  var name=currentUser.name;
  var canvas=document.createElement('canvas');
  canvas.width=160;canvas.height=80;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,160,80);
  ctx.save();
  ctx.translate(80,40);
  ctx.rotate(-30*Math.PI/180);
  ctx.font='bold 16px Arial';
  ctx.fillStyle='rgba(26,58,107,0.12)';
  ctx.textAlign='center';
  ctx.fillText(name,0,0);
  ctx.restore();
  wm.style.backgroundImage='url('+canvas.toDataURL()+')';
  wm.style.backgroundRepeat='repeat';
  wm.style.backgroundSize='160px 80px';
  wm.textContent='';
  buildCats();buildResults('');
}

function toggleAdmin(){showAdmin=!showAdmin;showReport=false;render();}
function toggleReport(){showReport=!showReport;showAdmin=false;render();}

function renderAdmin(){
  var staff=getStaff();
  var rows=staff.map(function(s){
    return '<div class="srow"><div><div class="sname">'+escH(s.name)+' ('+escH(s.u)+')</div><div class="smeta">'+escH(s.role)+'</div></div>'+(s.u!==currentUser.u?'<button class="sdel" onclick="delStaff(\''+escH(s.u)+'\')">Remove</button>':'<span style="font-size:10px;color:#aaa">You</span>')+'</div>';
  }).join('');
  return '<div class="panel"><h3>Staff Management</h3>'+rows+'<div class="add-row"><input id="an" placeholder="Full name"><input id="au" placeholder="Username"><input id="ap" placeholder="Password"><select id="ar" style="padding:6px 8px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:12px;background:#fff;color:#1a1a2e"><option value="staff">staff</option><option value="admin">admin</option></select><button class="add-btn" onclick="addStaff()">Add</button></div><div class="aerr" id="aerr"></div></div>';
}

function delStaff(u){
  var staff=getStaff().filter(function(s){return s.u!==u;});
  saveStaff(staff);render();
}

function addStaff(){
  var name=document.getElementById('an').value.trim();
  var u=document.getElementById('au').value.trim();
  var p=document.getElementById('ap').value.trim();
  var r=document.getElementById('ar').value;
  var err=document.getElementById('aerr');
  if(!name||!u||!p){err.textContent='Fill all fields.';return;}
  var staff=getStaff();
  if(staff.find(function(s){return s.u===u;})){err.textContent='Username taken.';return;}
  staff.push({u:u,p:p,role:r,name:name});
  saveStaff(staff);render();
}

function renderReport(){
  var logs=getLogs();
  var staff=getStaff();
  var staffNames=['all'].concat(staff.map(function(s){return s.u;}));
  var filtered=reportStaff==='all'?logs:logs.filter(function(l){return l.u===reportStaff;});
  var top={};
  filtered.forEach(function(l){top[l.q]=(top[l.q]||0)+1;});
  var topArr=Object.keys(top).sort(function(a,b){return top[b]-top[a];}).slice(0,5);
  var tabs='<div class="rtab">'+staffNames.map(function(n){return '<button class="'+(reportStaff===n?'on':'')+'" onclick="setRepStaff(\''+escH(n)+'\')">'+escH(n)+'</button>';}).join('')+'</div>';
  var stats='<div class="stat-row"><div class="stat-card"><div class="stat-n">'+filtered.length+'</div><div class="stat-l">Total searches</div></div><div class="stat-card"><div class="stat-n">'+Object.keys(top).length+'</div><div class="stat-l">Unique queries</div></div></div>';
  var topH='<div class="slbl">Top Searches</div>'+topArr.map(function(q){return '<div class="log-item"><span class="log-q">'+escH(q)+'</span><span class="log-t">x'+top[q]+'</span></div>';}).join('');
  var recent=(filtered.length?filtered.slice(-20).reverse():null);
  var logH=recent?'<div class="slbl">Recent Searches</div>'+recent.map(function(l){return '<div class="log-item"><span class="log-q"><b>'+escH(l.u)+'</b>: '+escH(l.q)+'</span><span class="log-t">'+fmtTime(l.t)+'</span></div>';}).join(''):'<div class="log-empty">No searches yet</div>';
  return '<div class="panel"><h3>Search Reports</h3>'+tabs+stats+topH+logH+'<button onclick="clearLogs()" style="font-size:11px;color:#c0392b;background:none;border:none;cursor:pointer;margin-top:8px;padding:0">Clear all logs</button></div>';
}

function setLang(l){var prev=document.getElementById('srch');var q=prev?prev.value:'';lang=l;cat='all';openId=null;render();var el=document.getElementById('srch');if(el){el.value=q;if(q)buildResults(q);}}

function buildCats(){

  el.innerHTML=cats.map(function(c){
    return '<button style="'+(cat===c.id?'background:'+c.c+';color:#fff;border-color:'+c.c+';':'')+'" onclick="setCat(\''+c.id+'\')">'+escH(c.l)+'</button>';
  }).join('');
}

function setCat(c){var prev=document.getElementById('srch');var q=prev?prev.value:'';cat=c;buildCats();buildResults(q);}

var searchTimer=null;
function doSearch(v){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){
    if(v&&v.trim().length>1)addLog(currentUser.u,v);
    buildResults(v);
  },250);
}

function buildResults(q){
  var tab=DB_EN[mode];
  var u=UI[lang];
  var filtered=tab.filter(function(c){
    if(cat==='all')return true;
    return c.cat===cat;
  });
  var scored;
  if(q&&q.trim().length>1){
    var ql=q.toLowerCase();
    scored=filtered.map(function(c){return {c:c,s:scoreCard(c,ql)};}).filter(function(x){return x.s>0;}).sort(function(a,b){return b.s-a.s;});
  } else {
    scored=filtered.map(function(c){return {c:c,s:1};});
  }
  var mc=document.getElementById('mc');
  if(mc)mc.textContent=scored.length+' '+u.found;
  var res=document.getElementById('results');
  if(!res)return;
  if(!scored.length){res.innerHTML='<div class="nores">'+escH(u.none)+'</div>';return;}
  var wmStrip='<div style="text-align:center;padding:3px 0;font-size:11px;font-weight:700;color:rgba(26,58,107,0.1);letter-spacing:5px;user-select:none;pointer-events:none;">'+currentUser.name.toUpperCase()+' &nbsp;&#183;&nbsp; MERCY SKILLS &nbsp;&#183;&nbsp; '+currentUser.name.toUpperCase()+' &nbsp;&#183;&nbsp; CONFIDENTIAL</div>';
  res.innerHTML=scored.map(function(x){return wmStrip+renderCard(x.c,x.s);}).join('')+wmStrip;
}

function renderCard(c,score){
  var u=UI[lang];
  var isOpen=openId===c.id;
  // get translated title
  var q=getT(c.id,lang,'q')||c.q;
  var catKey=c.cat;
  var badgeMap={pass:'#1a3a6b',worker:'#1a5c2a',maid:'#0e5c61',legal:'#8B0000',salary:'#b45309',complaint:'#4a235a',faq:'#1a5c8a',ms:'#1a3a6b',shield:'#1a5c2a',wakil:'#b45309',destina:'#4a235a',fw:'#1a3a6b',renew:'#b45309',ep:'#4a235a',obj:'#8B0000'};
  var badgeColor=badgeMap[catKey]||'#1a3a6b';
  var catLbl=catKey.charAt(0).toUpperCase()+catKey.slice(1);
  var isFaq=c.cat==='faq';
  var badge='<span class="cbadge" style="background:'+badgeColor+'1a;color:'+badgeColor+'">'+catLbl+'</span>';
  var faqBadge=isFaq?'<span class="qtag">FAQ</span>':'';
  var dot='<span class="sdot'+(score>5?' hi':'')+'"></span>';
  var hdr='<div class="card-hdr" onclick="toggleCard(\''+c.id+'\')">'+(dot)+'<span class="cq">'+faqBadge+escH(q)+'</span>'+badge+'<span class="carrow">'+(isOpen?'&#9650;':'&#9660;')+'</span></div>';
  if(!isOpen)return '<div class="card" id="card_'+c.id+'">'+hdr+'</div>';
  // Build body with translations
  var steps=getT(c.id,lang,'s')||c.s;
  var cost=getT(c.id,lang,'cost')||c.cost;
  var warn=getT(c.id,lang,'warn')||c.warn;
  var pitch=getT(c.id,lang,'pitch')||c.pitch;
  var honest=getT(c.id,lang,'honest')||c.honest;
  var body='<div class="card-body">';
  if(honest){
    body+='<div class="slbl">'+u.honest+'</div><div class="hbox">'+escH(honest)+'</div>';
  }
  if(steps&&steps.length){
    body+='<div class="slbl">'+u.steps+'</div>';
    steps.forEach(function(s,i){
      body+='<div class="step"><span class="stepn" style="background:#1a3a6b">'+(i+1)+'</span><span class="stept">'+escH(s)+'</span></div>';
    });
  }
  if(cost){body+='<div class="slbl">'+u.cost+'</div><div class="ibox">'+escH(cost)+'</div>';}
  if(warn){body+='<div class="slbl">'+u.warn+'</div><div class="wbox">'+escH(warn)+'</div>';}
  if(pitch){body+='<div class="slbl">'+u.pitch+'</div><div class="pbox">'+escH(pitch)+'</div>';}
  if(c.hl&&c.hl.length){
    body+='<div class="hlines">'+c.hl.map(function(h){return '<span class="hl">'+escH(h)+'</span>';}).join('')+'</div>';
  }
  body+='</div>';
  return '<div class="card" id="card_'+c.id+'">'+hdr+body+'</div>';
}

function toggleCard(id){
  openId=openId===id?null:id;
  var q=document.getElementById('srch');
  buildResults(q?q.value:'');
}

function doLogout(){currentUser=null;showAdmin=false;showReport=false;renderLogin();}

function renderLogin(){
  document.getElementById('root').innerHTML='<div class="login-wrap"><div class="login-box"><div class="login-logo">Mercy Skills Consultancy</div><div class="login-sub">JTKSM 928 &mdash; Solution Finder</div><div class="fl">Username</div><input id="lu" type="text" autocomplete="username"><div class="fl">Password</div><input id="lp" type="password" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')doLogin()"><button class="pri-btn" onclick="doLogin()">Login</button><div class="err" id="lerr"></div></div></div>';
}

function doLogin(){
  var u=document.getElementById('lu').value.trim();
  var p=document.getElementById('lp').value;
  var staff=getStaff();
  var found=staff.find(function(s){return s.u===u&&s.p===p;});
  if(found){currentUser=found;render();}
  else{document.getElementById('lerr').textContent='Incorrect username or password.';}
}

renderLogin();
