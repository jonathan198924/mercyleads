{id:"A2",cat:"worker",q:"How to hire foreign workers legally",k:"hire recruit foreign worker quota eppax section 60k",s:["Get Section 60K approval via ePPAx at eppax.gov.my — mandatory first.","Post vacancy on MYFutureJobs for minimum 30 days.","Apply quota at One Stop Centre (OSC), Ministry of Home Affairs.","Engage a JTKSM-licensed agency — verify at jtksm.gov.my.","Agency submits VDR via ePPAx and pays levy. Worker enters Malaysia, undergoes FOMEMA within 30 days.","VP(TE) and i-Kad issued after passing FOMEMA."],cost:"Levy: RM 1,850/year (manufacturing/services) | RM 640/year (plantation). Mercy Skills: quoted per case.",warn:"Hiring through unlicensed middlemen — employer fully liable. Fine RM 5,000-30,000 per worker.",pitch:"Mercy Skills JTKSM 928 handles the entire process. You approve workers, we deliver.",hl:["Mercy Skills: 012-8999274","ePPAx: eppax.gov.my"]},
{id:"A3",cat:"legal",q:"Employer caught with illegal workers or raided",k:"illegal pati raid caught harbouring",s:["Stop all illegal workers immediately.","Run e-Patuh check at app1.imi.gov.my/e-patuh.","Report voluntarily to SISPAA — voluntary is treated more leniently.","Contact Mercy Skills to start legal replacement process.","Notify JTKSM within 14 days of any new worker employment."],cost:"Fine: RM 5,000-30,000 per worker. Second offence: minimum RM 10,000.",warn:"347 employers fined RM 5.98M in Jan-Feb 2026. Ignorance is NOT a defence.",pitch:"When you use Mercy Skills, every worker is e-Patuh verified. This cannot happen.",hl:["Immigration: 03-8000 8000","Mercy Skills: 012-8999274"]},
{id:"A4",cat:"worker",q:"Permit renewal — VP(TE) or EP expiring soon",k:"renewal renew VP PLKS expire permit",s:["Start now if expiry is within 90 days.","VP(TE): submit renewal via ePPAx. Arrange FOMEMA medical (RM 180-250).","Pay levy: RM 1,850 (manufacturing) or RM 640 (plantation).","EP: submit via Xpats Gateway. Pay RM 2,160. Allow 6-8 weeks.","Or call Mercy Skills — we handle everything from RM 400 per worker."],cost:"GOVT FEES (employer pays direct): Levy RM 1,850/yr (mfg/services) or RM 640/yr (plantation) + FOMEMA medical RM 217 + VP(TE) sticker fee RM 60-120 + SPIKPA insurance RM 120-180. MERCY SKILLS SERVICE FEE: RM 400-600/worker. Maid renewal govt total: RM 610-811 + Mercy Skills RM 1,500-2,500.",warn:"Late renewal means worker is illegal on expiry date. Fine RM 5,000-30,000 per worker. Renewal must be submitted 3 months before expiry.",pitch:"Mercy Skills sends reminders 90 days before every expiry and handles all renewal paperwork.",hl:["Mercy Skills: 012-8999274","ePPAx: eppax.gov.my"]},
{id:"A5",cat:"maid",q:"Want to hire a maid or domestic helper",k:"maid FDH domestic helper hire pembantu",s:["Employer: Malaysian/PR/EP Cat I or II, aged 21+, min household income RM 3,000-7,000.","Get JTKSM pre-approval via ePPAx — mandatory from 2025.","Source countries: Indonesia, Philippines, Cambodia, Sri Lanka, Nepal, India, Vietnam, Thailand, Laos.","Contact Mercy Skills — we source, screen, process all documentation, and deliver.","FDH enters Malaysia. Employer receives her at entry point. FOMEMA within 30 days.","Muslim employers must hire Muslim FDH only. One FDH per household."],cost:"Indonesian: RM 12,000-15,000 all-in. Filipino: RM 16,000-18,000. Levy: EXEMPT. Min salary: Indonesian RM 1,500/mth, Filipino RM 1,800/mth.",warn:"Only use JTKSM-licensed agencies. Unlicensed agents are the most common source of maid scams.",pitch:"Mercy Skills full maid placement from RM 12,000. 3-6 month abscondment warranty.",hl:["Mercy Skills: 012-8999274"]},
{id:"A6",cat:"maid",q:"Maid ran away or absconded",k:"abscond lari ran away missing hilang",s:["File police report within 24 hours.","Get Foreign Worker Report Form (Escaping) at any Immigration office.","Report via ePPAx to cancel PL(KS) and stop levy charges.","Personal bond forfeited if NOT reported properly.","Check Mercy Skills contract for abscondment warranty (3-6 months)."],cost:"Personal bond forfeited if not reported. Replacement subject to new fee.",warn:"Must report within 24 hours. Absconded FDH is blacklisted.",pitch:"Mercy Skills contracts include 3-6 month abscondment warranty.",hl:["Police: 999","Immigration: 03-8000 8000","Mercy Skills: 012-8999274"]},
{id:"A7",cat:"salary",q:"Worker or maid salary not paid or late",k:"salary gaji unpaid tidak bayar late wage local Malaysian worker rights pay",s:["Gather evidence: bank statements, payslips, contract, WhatsApp exports.","Send formal Letter of Demand by Registered Post — state amount and 7-day deadline.","File complaint via eAduan JTKSM app or jtksm.gov.my/complaints.","Walk in to nearest JTKSM office with all documents.","JTKSM mediates. Labour Court Section 69 EA — up to RM 50,000, no lawyer needed."],cost:"JTKSM complaint: FREE. Labour Court: FREE.",warn:"File within 60 days of breach. Keep all digital evidence.",pitch:"MyShield members (RM 20/month) get immediate officer assistance.",hl:["JTKSM: 03-8000 8000","eAduan: iOS and Android"]},
{id:"A8",cat:"legal",q:"Employer holding or confiscating worker passport",k:"passport confiscate rampas withhold tahan",s:["Criminal offence under Section 12(1)(f) Passports Act 1966.","Worker files police report AND report to Immigration simultaneously.","Call JTKSM 03-8000 8000 and TIP 15000.","ATIPSOM protection applies — worker cannot be charged while reporting.","Employer faces fine up to RM 10,000 or 5 years imprisonment."],cost:"No cost to report.",warn:"Workers keep own passport at ALL times. No exception.",pitch:"All Mercy Skills placement contracts include mandatory passport-keeping clauses.",hl:["JTKSM: 03-8000 8000","TIP: 15000","Police: 999"]},
{id:"A9",cat:"pass",q:"Employment Pass application for expatriate",k:"EP employment pass expatriate ESD xpats",s:["Employer registers at esd.imi.gov.my.","Apply for Expatriate position approval. Get CGC from home country — allow 2-4 extra weeks.","Submit via Xpats Gateway: passport, degree, contract, company documents, CGC.","Pay RM 2,160. Processing: 6-8 weeks (Cat I/II), 8-12 weeks (Cat III).","VDR issued. Employee enters Malaysia. EP endorsed on passport."],cost:"GOVT FEE (Sep 2024 onwards): EP RM 2,000 + 6% SST = RM 2,120. Dependent Pass RM 500 + SST = RM 530. PVP RM 1,200 + SST = RM 1,272. MERCY SKILLS SERVICE FEE: Cat I (RM 10K+/mth) RM 3,000-5,000 | Cat II (RM 5K-9,999) RM 2,000-3,500 | Cat III (RM 3K-4,999) RM 1,500-2,500.",warn:"CGC mandatory from 2026. Cat I: RM 10K+/mth. Cat II: RM 5K-9,999. Cat III: RM 3K-4,999.",pitch:"Mercy Skills handles full ESD registration and EP application.",hl:["Xpats Gateway: esd.imi.gov.my","Mercy Skills: 012-8999274"]},
{id:"A10",cat:"complaint",q:"Maid agency scam or no refund",k:"agency refund breach scam tipu no maid",s:["Gather evidence: contract, payment receipts, WhatsApp exports.","Send Letter of Demand by Registered Post — state breach, 7-day deadline.","File eAduan JTKSM — threatens agency licence.","File at TTPM (ttpm.gov.my) simultaneously — claims up to RM 50,000, RM 5 fee."],cost:"TTPM filing: RM 5. Can recover up to RM 50,000.",warn:"File BOTH JTKSM and TTPM at the same time for fastest results.",pitch:"Mercy Skills is licensed JTKSM 928. Written agreement before any work begins.",hl:["JTKSM: 03-8000 8000","TTPM: 1-800-88-9811"]},
{id:"A11",cat:"maid",q:"Maid physically abused by employer",k:"abuse dera mistreat pukul assault",s:["FDH goes to nearest police station — NOT agency, NOT Immigration first.","File police report and get the report number.","Contact embassy: Indonesian 03-4253 2100 or Philippine 03-2148 4233.","Call JTKSM 03-8000 8000 for emergency protection orders.","If passport held: file separate Passports Act complaint at Immigration."],cost:"No cost to report.",warn:"Never advise FDH to return to employer while complaint is active.",pitch:"This is why MyShield exists — RM 20/month, dedicated officer on call 24/7.",hl:["Police: 999","Indonesian Embassy: 03-4253 2100","JTKSM: 03-8000 8000"]},
{id:"A12",cat:"legal",q:"Human trafficking or forced labour",k:"trafficking TIP forced labour ATIPSOM debt bondage",s:["Call TIP Hotline 15000 immediately — 24 hours, anonymous, multilingual.","ATIPSOM protection: victim CANNOT be charged for immigration offences.","Report to JTKSM (03-8000 8000) and Police (999) simultaneously.","Indicators: passport held, wages withheld, movement restricted, debt bondage."],cost:"No cost. Trafficker: 3-20 years imprisonment.",warn:"Victims fully protected. ATIPSOM immunity applies when reporting.",pitch:"Mercy Skills placements include mandatory passport-keeping and bank-transfer salary clauses.",hl:["TIP: 15000 (24hrs)","JTKSM: 03-8000 8000","Police: 999"]},
{id:"A13",cat:"worker",q:"Worker wants to change employer",k:"change employer transfer tukar majikan",s:["VP(TE): current employer applies Change of Employer via ePPAx. Cross-sector transfers permitted since 2025.","Do NOT start work at new employer until new VP(TE) is issued.","EP: current EP cancelled first. New employer applies fresh EP (RM 2,160).","Company closed: apply Special Pass (RM 100-200) at Immigration, then Change of Employer via ePPAx."],cost:"Change of Employer: standard levy. Special Pass: RM 100-200.",warn:"Working at new employer before new pass is issued is criminal.",pitch:"Mercy Skills manages Change of Employer via ePPAx — worker stays legal throughout.",hl:["ePPAx: eppax.gov.my","Mercy Skills: 012-8999274"]},
{id:"A14",cat:"pass",q:"Student pass part-time work rules",k:"student pelajar part time 20 hours study",s:["Only UA or IPTS students — Language Centre students cannot work.","Work only during semester breaks or holidays exceeding 7 consecutive days.","4 sectors only: (1) Restaurants — waiter/kitchen, NOT cashier. (2) Hotels — general service, NOT singer/masseur/GRO. (3) Petrol Kiosks. (4) Mini Markets. Max 20 hours/week.","How to apply: get offer letter, submit to university, student AND university rep attend Immigration together, wait for written approval, then start."],cost:"Approval: FREE. Student pass: RM 60/year.",warn:"Working during active semester is illegal. Gig work NOT covered.",pitch:"MyWakil student membership RM 10/month — dedicated officer helps with employment rights.",hl:["Immigration: 03-8000 8000"]},
{id:"A15",cat:"complaint",q:"How to file a complaint — general guide",k:"complain report aduan lodge SISPAA",s:["Immigration offences: SISPAA at imi.spab.gov.my or 03-8000 8000.","Labour disputes: eAduan JTKSM app or jtksm.gov.my.","Trafficking: TIP 15000 — 24 hours, anonymous.","Corrupt officials: MACC 1-800-88-6000.","Agency breach: TTPM ttpm.gov.my — RM 5, up to RM 50,000.","Emergency: Police 999."],cost:"All FREE except TTPM (RM 5).",warn:"Voluntary reporting always results in more lenient treatment.",pitch:"Mercy Skills clients get direct guidance on which channel to use.",hl:["JTKSM: 03-8000 8000","TIP: 15000","Police: 999"]},
{id:"F1",cat:"faq",q:"I have workers but no permit — can I do permit for them now?",k:"no permit legalise apply now undocumented workers without permit myanmar",honest:"Yes, you can apply for VP(TE) — BUT only if workers entered Malaysia legally through official entry points. Workers who entered illegally CANNOT be legalised and must return home first.",s:["Check: did workers enter through official entry points (KLIA, JB CIQ, official land crossings)?","Apply Special Pass (RM 100-200 per worker) at Immigration if entered legally.","Employer applies Section 60K approval via ePPAx.","Post on MYFutureJobs 30 days, then apply quota at OSC.","Engage Mercy Skills (JTKSM 928) to handle VDR, FOMEMA, levy, and VP(TE).","Workers who entered illegally: must leave via Check Out Memo (COM), return home, then re-enter via proper VDR."],cost:"Special Pass: RM 100-200 per worker. Levy: RM 1,850/year. Mercy Skills: quoted per case.",warn:"Workers without valid passes expose employer to fines of RM 5,000-30,000 per worker.",pitch:"Mercy Skills handles this exact situation — from Special Pass to full VP(TE). Call us today.",hl:["Mercy Skills: 012-8999274","ePPAx: eppax.gov.my"]},
{id:"F2",cat:"faq",q:"My workers permit expired 2 months ago — what happens to me?",k:"expired 2 months employer liability fine workers permit lapsed",honest:"Your workers have been illegal for 2 months. You are exposed to fines of RM 5,000-30,000 per worker. Act immediately.",s:["Stop workers from working immediately.","Run e-Patuh check on each worker at app1.imi.gov.my/e-patuh.","Workers pay overstay compound: 31-60 days = RM 1,000 flat per worker.","Apply Special Pass (RM 100-200) for each worker while renewal is processed.","Submit renewal via ePPAx immediately. Arrange FOMEMA medical.","Consider voluntary disclosure to Immigration — treated more leniently.","Call Mercy Skills to manage urgent renewal process."],cost:"Overstay compound: RM 1,000 flat per worker (31-60 days). Special Pass: RM 100-200. Renewal govt fees: Levy RM 1,850/RM 640 + FOMEMA RM 217 + sticker RM 60-120. Mercy Skills service fee: RM 400-600/worker.",warn:"Every extra day increases your legal exposure. Do not delay.",pitch:"Mercy Skills handles urgent permit renewals. We can start processing within 24 hours.",hl:["Mercy Skills: 012-8999274","Immigration: 03-8000 8000"]},
{id:"F3",cat:"faq",q:"Hired workers through agent but they have no i-Kad or documents",k:"no ikad no documents fake agent no permit unlicensed",honest:"This is serious. If the agent was unlicensed, workers likely have no valid immigration status. Employer is fully liable under Section 55E regardless of how workers were sourced.",s:["Check every worker on e-Patuh using their passport number.","If e-Patuh shows no record — worker has no valid status. Stop work immediately.","Report to SISPAA voluntarily.","File complaint against unlicensed agent at JTKSM.","Workers who entered legally: apply Special Pass and begin VP(TE) via Mercy Skills.","Workers with no documents: contact Immigration Enforcement for voluntary surrender.","Going forward: always verify JTKSM licence at jtksm.gov.my before paying any deposit."],cost:"Potential fines: RM 5,000-30,000 per worker.",warn:"Unlicensed agents are the number one cause of this situation in Malaysia.",pitch:"Mercy Skills is fully licensed JTKSM 928. Written agreements and verified documentation for every worker.",hl:["e-Patuh: app1.imi.gov.my/e-patuh","JTKSM: 03-8000 8000","Mercy Skills: 012-8999274"]},
{id:"F4",cat:"faq",q:"My worker is working at my factory but permit is under another company",k:"wrong employer name permit different company mismatch",honest:"This is a criminal breach of VP(TE) conditions. The worker's pass is locked to the employer named on it. Both worker and your company are liable.",s:["Stop the worker from working at your premises immediately.","The employer named on VP(TE) must apply Change of Employer via ePPAx.","Cross-sector transfers are permitted since 2025.","Worker must NOT resume work until new VP(TE) with your company name is issued.","Call Mercy Skills to manage the Change of Employer application."],cost:"Change of Employer: standard levy. Processing: 2-4 weeks.",warn:"Allowing a worker to continue under another company name exposes both companies to prosecution.",pitch:"Mercy Skills handles Change of Employer via ePPAx — worker stays legal throughout.",hl:["ePPAx: eppax.gov.my","Mercy Skills: 012-8999274"]},
{id:"F5",cat:"faq",q:"My foreign worker died at the workplace — what do I do?",k:"worker died death workplace accident fatal",honest:"This is a workplace fatality. You have immediate legal obligations under SOCSO, Employment Act, and Immigration Act.",s:["Call police (999) and ambulance immediately.","Report to SOCSO within 48 hours at perkeso.gov.my or 1-300-22-8000.","Report death to Immigration Department immediately to cancel VP(TE) and i-Kad.","Notify worker embassy and assist with repatriation of remains — employer bears cost.","Report to DOSH within 7 days.","Contact Mercy Skills for assistance with all documentation."],cost:"Repatriation of remains: RM 3,000-8,000.",warn:"Failure to report to DOSH within 7 days carries fines under OSH Act 1994.",pitch:"Mercy Skills handles post-fatality documentation, Immigration cancellation, and embassy coordination.",hl:["Police: 999","SOCSO: 1-300-22-8000","Immigration: 03-8000 8000"]},
{id:"F6",cat:"faq",q:"My worker failed FOMEMA medical — what happens now?",k:"failed FOMEMA medical fail health check sick unfit",honest:"A worker who fails FOMEMA must be repatriated. No VP(TE) or i-Kad will be issued. Employer must arrange and pay for the worker to return home.",s:["Get the FOMEMA failure notice from the clinic.","Apply for Check Out Memo (COM) at Immigration Department immediately.","Purchase return flight ticket — employer bears this cost.","Worker departs Malaysia using the COM.","Contact Mercy Skills for replacement — contracts include FOMEMA failure replacement clause."],cost:"Return flight: RM 500-1,500. Replacement: subject to agency terms.",warn:"Detaining a FOMEMA-failed worker or letting them work is a serious immigration offence.",pitch:"Mercy Skills contracts include FOMEMA failure replacement at no extra agency fee within warranty period.",hl:["Mercy Skills: 012-8999274","Immigration: 03-8000 8000"]},
{id:"F7",cat:"faq",q:"I want to reduce my foreign workers — how do I send them home?",k:"reduce workers repatriate send home terminate reduce headcount",honest:"You can legally repatriate workers, but there is a correct procedure. Improper termination exposes you to Employment Act claims.",s:["Give proper notice as per contract — minimum 4 weeks or pay in lieu.","Apply Check Out Memo (COM) at Immigration for each worker.","Cancel VP(TE) via ePPAx — notify JTKSM within 30 days of termination.","Purchase return flight tickets — employer bears repatriation costs.","Return each worker passport and all original documents.","Pay all salary, overtime, and entitlements in full before departure.","Get worker to sign final settlement form confirming full payment received."],cost:"Return flight: RM 500-2,000 per worker.",warn:"Workers can still file salary or dismissal claims even after returning home.",pitch:"Mercy Skills handles proper repatriation documentation, COM applications, and ePPAx cancellations.",hl:["Mercy Skills: 012-8999274","ePPAx: eppax.gov.my"]},
{id:"F8",cat:"faq",q:"My worker wants to go home early before permit expires",k:"worker wants go home early leave before expiry early termination resign",honest:"A worker can return home early but the permit must be cancelled properly or levy charges continue.",s:["Settle all outstanding salary, leave, and allowances with the worker.","Get worker to sign a voluntary resignation or mutual termination letter.","Apply for Check Out Memo (COM) at Immigration.","Cancel VP(TE) via ePPAx to stop levy charges.","Return worker passport and all documents.","Purchase return flight — check contract for who bears the cost.","Notify JTKSM within 14 days of termination via ePPAx."],cost:"COM application: nominal. ePPAx cancellation: free. Flight: RM 500-1,500.",warn:"If you do not cancel the VP(TE), levy continues even after the worker has left.",pitch:"Mercy Skills handles VP(TE) cancellations, COM applications, and all ePPAx termination notifications.",hl:["Mercy Skills: 012-8999274","ePPAx: eppax.gov.my"]},
{id:"F9",cat:"faq",q:"Can I bring back a worker who was deported before?",k:"deported blacklisted bring back previous worker return after deportation",honest:"A deported worker is blacklisted. They cannot enter Malaysia legally while blacklisted. Blacklist removal must be applied for first — no guaranteed timeline.",s:["Worker applies for blacklist removal from outside Malaysia — write formally to Director General of Immigration, Putrajaya.","Letter must include: old passport, new passport, deportation order, full explanation, proof of no further offences.","Processing: 6 months to 2 years with no guaranteed outcome.","Once blacklist is removed, employer can begin fresh VDR application.","Never attempt re-entry using a different passport — biometric systems detect regardless.","Mercy Skills can advise on the blacklist removal letter and coordinate fresh VDR once cleared."],cost:"Blacklist removal: legal assistance recommended. Fresh VP(TE): standard levy and agency fees.",warn:"Attempting entry while blacklisted with different passport carries additional criminal charges.",pitch:"Mercy Skills advises on blacklist removal and manages fresh recruitment once cleared.",hl:["Mercy Skills: 012-8999274","Immigration HQ: 03-8880 1000"]},
{id:"F10",cat:"faq",q:"My maid is pregnant — what are my obligations?",k:"maid pregnant pregnancy helper FDH pregnant",honest:"Employer may terminate contract due to pregnancy under bilateral agreements — but must pay all outstanding wages and provide repatriation at employer cost.",s:["Send FDH for medical examination to confirm pregnancy.","Pay all outstanding wages in full.","Apply for Check Out Memo (COM) at Immigration.","Purchase return flight ticket — employer bears this cost.","The FDH cannot remain and work — Immigration will not renew VP(TE) for a pregnant FDH.","Contact Mercy Skills for replacement — some contracts cover this scenario."],cost:"Repatriation flight: RM 800-1,500. All outstanding salary must be paid in full.",warn:"Abandoning a pregnant FDH without proper repatriation is a serious welfare and legal violation.",pitch:"Mercy Skills handles the repatriation and replacement process for this scenario.",hl:["Mercy Skills: 012-8999274","Indonesian Embassy: 03-4253 2100"]},
{id:"F11",cat:"faq",q:"My maid refuses to work — what can I do?",k:"maid refuse work lazy not working helper refuse duties",honest:"A FDH refusing duties is a breach of contract. You have the right to terminate — but must follow the correct process.",s:["Document every incident in writing — dates, times, what was asked, what was refused.","Issue a formal verbal warning, then a written warning. Give reasonable time to improve.","If no improvement: issue notice of termination as per the contract.","Apply Check Out Memo (COM) at Immigration and arrange repatriation.","Settle all outstanding salary before she departs.","Contact Mercy Skills — most contracts include a performance-based replacement clause."],cost:"Repatriation flight: RM 800-1,500. Replacement subject to agency terms.",warn:"Physical punishment or confiscating passport is illegal and will result in criminal charges against you.",pitch:"Mercy Skills placement contracts include performance replacement clauses.",hl:["Mercy Skills: 012-8999274"]},
{id:"F12",cat:"faq",q:"Can I hire a second maid? I already have one.",k:"second maid second helper two maids additional FDH",honest:"A household can only have one FDH in most cases. A second FDH requires special approval based on specific qualifying circumstances.",s:["You qualify for a second FDH if: you have 4 or more children under 15, or you/spouse has serious illness/disability, or you have elderly parents requiring full-time care.","Your household income must meet a higher threshold for a second FDH.","Apply through State Immigration Office with supporting documents.","Contact Mercy Skills to assess eligibility and assist with the application."],cost:"Standard placement fees apply for the second FDH.",warn:"Bringing in a second FDH without approval means the second helper has no legal status.",pitch:"Mercy Skills assesses second FDH eligibility and manages the full application.",hl:["Mercy Skills: 012-8999274","Immigration: 03-8000 8000"]},
{id:"F13",cat:"faq",q:"I am a foreigner with EP — can I hire a maid?",k:"expat foreigner EP holder hire maid employment pass",honest:"Yes, EP Category I or Category II holders can hire a FDH. Category III EP holders are NOT eligible.",s:["Confirm you hold EP Category I (RM 10,000+/mth) or Category II (RM 5,000-9,999/mth).","Income requirement still applies: Indonesian FDH requires household income RM 7,000/mth, Filipino RM 5,000.","JTKSM pre-approval required via ePPAx.","All standard FDH procedures apply — VDR, FOMEMA, PL(KS).","Contact Mercy Skills to verify eligibility and start application."],cost:"Standard maid placement fees: Indonesian RM 12,000-15,000, Filipino RM 16,000-18,000.",warn:"EP Category III holders are NOT eligible to hire a domestic helper.",pitch:"Mercy Skills handles FDH placements for EP holders.",hl:["Mercy Skills: 012-8999274"]},
{id:"F14",cat:"faq",q:"Worker overstayed and is afraid to go to Immigration",k:"afraid scared go immigration overstay worker scared report fear",honest:"Voluntary surrender is always treated more leniently than being caught. The longer they wait, the worse the penalty.",s:["Reassure the worker: walking in voluntarily shows good faith — Immigration treats voluntary cases far more leniently.","Check exact days overstayed — if 90 days or less, pay compound and get Special Pass.","Bring passport and employer letter to nearest Immigration office.","Pay compound: RM 30/day (1-30d), RM 1,000 flat (31-60d), RM 2,000 flat (61-90d).","Over 90 days: go to Immigration Enforcement Division — voluntary still better than arrest.","Mercy Skills can guide employer and worker through the voluntary surrender process."],cost:"Compound: RM 30/day (1-30d) | RM 1,000 flat (31-60d) | RM 2,000 flat (61-90d). Special Pass: RM 100-200.",warn:"Every additional day of hiding increases the fine and risk of detention.",pitch:"Mercy Skills guides employers through voluntary surrender and renewal process step by step.",hl:["Immigration: 03-8000 8000","Mercy Skills: 012-8999274"]},
{id:"F15",cat:"faq",q:"My worker got injured at work — what are my responsibilities?",k:"worker injured accident workplace injury hurt at work SOCSO",honest:"You have immediate legal obligations under SOCSO, Employment Act, and OSH Act. All foreign workers (except FDH) must be registered with SOCSO.",s:["Provide immediate medical treatment — bring worker to SOCSO panel clinic or hospital.","All medical costs for work-related injuries are covered by SOCSO — do not ask worker to pay.","Report to SOCSO within 48 hours using Form SOCSO 21 at perkeso.gov.my.","If fatal or absence more than 4 days: also report to DOSH within 7 days.","Do NOT pressure worker not to report the injury.","Ensure worker was registered with SOCSO from day one."],cost:"All costs covered by SOCSO if worker is properly registered. If not: employer bears 100% of all costs.",warn:"Failure to register foreign workers with SOCSO means employer is personally liable for all injury costs.",pitch:"Mercy Skills ensures every worker we place is properly registered with SOCSO from day one.",hl:["SOCSO: 1-300-22-8000","DOSH: 03-8000 8000"]},
{id:"F16",cat:"faq",q:"Can I move my worker to a different sector?",k:"change sector transfer manufacturing services plantation cross sector",honest:"Yes — cross-sector transfers are permitted since 2025. A formal Change of Employer and sector process must be done via ePPAx.",s:["Current employer applies for Change of Employer and sector update via ePPAx.","New VP(TE) will be issued reflecting new employer name and sector.","Worker must NOT start in new sector until new VP(TE) is officially issued.","Levy rates may change depending on new sector.","Contact Mercy Skills to process the ePPAx Change of Employer application."],cost:"Change of Employer: standard levy for new sector applies.",warn:"Working in new sector before new VP(TE) is issued is a criminal breach.",pitch:"Mercy Skills manages Change of Employer and sector transfers via ePPAx.",hl:["ePPAx: eppax.gov.my","Mercy Skills: 012-8999274"]},
{id:"F17",cat:"faq",q:"A worker is asking me to hire them directly — no agency. Is this allowed?",k:"direct hire no agency worker approach directly no agent bypass",honest:"Directly hiring a foreign worker who approaches you without a VDR means the worker cannot legally work for you.",s:["Check worker current immigration status on e-Patuh using their passport number.","If worker has valid VP(TE) under another employer — apply Change of Employer via ePPAx.","If worker is on Social Visit Pass — they cannot work for you. Must begin fresh VDR from home country.","Never start employment without valid VP(TE) in your company name.","Contact Mercy Skills — we can assess status and identify the fastest legal path."],cost:"Change of Employer: standard levy. Fresh VP(TE): full agency and levy fees.",warn:"Employing a worker on a Social Visit Pass even temporarily is illegal under Section 6(3).",pitch:"Mercy Skills can quickly assess a walk-in worker status and identify the fastest legal path.",hl:["e-Patuh: app1.imi.gov.my/e-patuh","Mercy Skills: 012-8999274"]},
{id:"F18",cat:"faq",q:"My worker passport is expiring — does that affect the VP(TE)?",k:"passport expiring worker passport expire renew validity VP",honest:"Yes. If the worker passport expires, the VP(TE) sticker becomes invalid even if the VP(TE) itself has not expired.",s:["Check passport expiry — must have at least 6 months validity for pass renewal approval.","Worker applies for passport renewal at home country embassy in Malaysia.","Once new passport issued, bring both old and new passport to Immigration to transfer endorsement.","Proceed with VP(TE) renewal via ePPAx if also due.","Mercy Skills coordinates passport transfer and renewal process."],cost:"Embassy passport renewal: approximately RM 50-200. VP(TE) renewal via Mercy Skills: RM 400-600.",warn:"Worker with expired passport is effectively undocumented even if VP(TE) has not technically expired.",pitch:"Mercy Skills tracks both passport and VP(TE) expiry dates and alerts you 90 days before either expires.",hl:["Indonesian Embassy: 03-4253 2100","Philippine Embassy: 03-2148 4233","Mercy Skills: 012-8999274"]},
{id:"F19",cat:"faq",q:"Indonesian maid price is too high — can I negotiate?",k:"indonesian maid price too expensive negotiate cheaper maid cost",honest:"The maximum regulated price for Indonesian FDH is RM 15,000 all-in through a licensed MRA. Anyone offering below RM 10,000 is almost certainly unlicensed.",s:["Understand what the fee covers: sourcing, documentation, VDR, FOMEMA, PL(KS), insurance — comprehensive.","Payment terms help: Mercy Skills accepts 50% deposit on signing and 50% on arrival.","Consider Filipino maid if budget is flexible — RM 16,000-18,000, generally very reliable.","Do NOT engage agents offering Indonesian maids at RM 6,000-8,000 — almost always scams.","Verify any agency at jtksm.gov.my before paying any money."],cost:"Indonesian FDH: maximum RM 15,000 all-in through licensed MRA. Filipino: RM 16,000-18,000.",warn:"Sub-market price offers almost always result in non-delivery or workers with fake documents.",pitch:"Mercy Skills offers transparent all-in pricing with 50/50 payment terms and abscondment warranty.",hl:["Mercy Skills: 012-8999274"]},
{id:"F20",cat:"faq",q:"My worker is sick and in hospital — who pays?",k:"worker sick hospital medical bill who pays sick hospitalized",honest:"For work-related illness: SOCSO covers if worker is registered. For non-work-related illness: employer is responsible during employment period.",s:["Determine if illness is work-related — this decides which coverage applies.","Work-related: bring worker to SOCSO panel hospital. File SOCSO claim within 48 hours.","Non-work-related: employer covers medical costs under Employment Act.","For FDH: SKHPPA insurance covers hospitalisation up to RM 20,000/year — ensure this is active.","Employer must still pay salary during hospitalisation up to the period in the contract."],cost:"SOCSO covers work-related if registered. Non-work-related: employer pays. FDH SKHPPA: up to RM 20,000/year.",warn:"If SOCSO registration was not done, employer bears 100% of all medical costs personally.",pitch:"Mercy Skills ensures all workers are covered under SOCSO and FDH have active SKHPPA insurance from day one.",hl:["SOCSO: 1-300-22-8000","Mercy Skills: 012-8999274"]},
{id:"F21",cat:"faq",q:"Employer threatens to deport me if I complain — what do I do?",k:"employer threaten deport scare worker threat deportation intimidation local Malaysian rights bully",honest:"This is illegal intimidation. Your employer has no power to deport you — only the Malaysian Immigration Department can, and only after due process.",s:["Know your rights: your employer cannot deport you. Only Immigration Department can.","If your pass is valid, you are legal in Malaysia and protected by Malaysian employment law.","Document the threat: write down exactly what was said, when, and any witnesses.","Report to JTKSM at 03-8000 8000 or via eAduan JTKSM app — anonymous option available.","Contact your country embassy for consular protection.","If MyShield member: call your protection officer — they will contact the employer directly.","TIP Hotline 15000 if you believe you are being controlled or trafficked."],cost:"No cost to report.",warn:"Malaysian law protects workers who make legitimate complaints from retaliation.",pitch:"MyShield at RM 20/month — your dedicated officer speaks to your employer for you.",hl:["JTKSM: 03-8000 8000","TIP: 15000","MyShield: +60199888720"]},
{id:"F22",cat:"faq",q:"My contract says RM 1,800 salary but employer pays only RM 1,200",k:"salary cut underpaid contract salary different actual receive less local Malaysian worker rights pay",honest:"This is a clear breach of your employment contract. You are entitled to the salary stated in your contract. You have the right to file a formal claim.",s:["Gather evidence: signed contract, all bank statements, payslips, WhatsApp messages.","Calculate total shortfall for each underpaid month.","Send formal Letter of Demand to employer by Registered Post — state total owed and 7-day deadline.","File complaint via eAduan JTKSM app or walk in to nearest JTKSM office.","JTKSM mediates. Labour Court under Section 69 EA can award up to RM 50,000.","If MyShield member: officer contacts employer formally within 24 hours."],cost:"JTKSM complaint: FREE. Labour Court claim: FREE.",warn:"File within 60 days of each underpayment.",pitch:"MyShield members get immediate action — officer contacts employer within 24 hours. RM 20/month.",hl:["JTKSM: 03-8000 8000","MyShield: +60199888720"]},
{id:"F23",cat:"faq",q:"I want to change employer but my boss will not release me",k:"want change employer boss refuse release worker stuck trapped local Malaysian rights resign quit",honest:"Your employer cannot legally hold you against your will. VP(TE) requires current employer to apply Change of Employer via ePPAx — but JTKSM can compel them to cooperate.",s:["You cannot simply start working for someone else — VP(TE) is tied to current employer.","Request Change of Employer in writing to current employer — email or WhatsApp so you have a record.","If employer refuses without valid reason: report to JTKSM at 03-8000 8000.","If employer is also holding your passport: report to police (999) and JTKSM simultaneously.","If threats, abuse, or forced labour: contact TIP Hotline 15000 immediately.","Once employer cooperates: Change of Employer via ePPAx proceeds normally."],cost:"No cost to report to JTKSM. Change of Employer: standard levy.",warn:"Do not abandon current employer and start work elsewhere — creates criminal liability.",pitch:"MyShield officers mediate directly with employers on behalf of workers. RM 20/month.",hl:["JTKSM: 03-8000 8000","TIP: 15000","MyShield: +60199888720"]},
{id:"F24",cat:"faq",q:"My employer is not giving me a rest day — is that legal?",k:"no rest day worker no day off no holiday rest denied local Malaysian rights Employment Act",honest:"No — this is illegal. Under Employment Act 1955, all employees including foreign workers are entitled to a minimum of one rest day per week.",s:["Document every working day with no rest day — dates are important.","Inform employer in writing (WhatsApp is acceptable as evidence) requesting your legal rest day.","If employer refuses: file complaint via eAduan JTKSM app.","For FDH: same right applies under Employment Act and bilateral agreement.","If you work on rest day, employer must pay additional pro-rated daily wage.","If MyShield member: officer contacts employer and references the specific legal provision."],cost:"No cost to report.",warn:"Employers who consistently deny rest days face fines under Employment Act.",pitch:"MyShield at RM 20/month — officer enforces your rights directly with your employer.",hl:["JTKSM: 03-8000 8000","MyShield: +60199888720"]},
{id:"F25",cat:"faq",q:"My employer deducted money from salary without telling me",k:"salary deduction illegal deduction unauthorized deduction money taken salary cut local Malaysian worker rights",honest:"Salary deductions without prior written consent or a lawful basis are illegal under Section 24 Employment Act 1955.",s:["Review employment contract to see what deductions were agreed to in writing.","Illegal deductions include: food/accommodation fees without prior agreement, recruitment debt, penalty deductions not in contract.","Write to employer asking for written explanation and breakdown of every deduction.","If no valid explanation: file complaint at JTKSM via eAduan app.","JTKSM can order employer to repay all unlawful deductions.","If deductions are for recruitment debt — this is a trafficking indicator. Contact TIP 15000."],cost:"JTKSM complaint: FREE.",warn:"Recruitment cost deductions from salary are a major red flag for debt bondage and trafficking.",pitch:"MyShield officers handle salary dispute cases including unlawful deductions. RM 20/month.",hl:["JTKSM: 03-8000 8000","TIP: 15000","MyShield: +60199888720"]}

{id:"B3",cat:"ms",q:"Mercy Skills — Work Permit Renewals",k:"renewal permit FOMEMA PLKS renew baharui expire expiry VP(TE) work permit",s:["Full renewal for all types: VP(TE), FDH, PVP holders.","We handle: FOMEMA, ePPAx, levy, Immigration, permit sticker return.","Automatic reminders 90 days before expiry. Batch discount for 5+ workers."],cost:"GOVT FEES per worker (employer pays direct): Levy RM 1,850 (mfg/services) or RM 640 (plantation) + FOMEMA RM 217 + VP(TE) sticker RM 60-120 + SPIKPA RM 120-180. FDH govt renewal total: RM 610-811. MERCY SKILLS SERVICE FEE: RM 400-600/worker. Maid renewal: RM 1,500-2,500.",warn:"One day late means worker is illegal. Fine RM 5,000-30,000 per worker. Submit 3 months before expiry.",pitch:"",hl:["Mercy Skills: 012-8999274"]},
{id:"B4",cat:"ms",q:"Mercy Skills — ESD and Employment Pass EP",k:"ESD employment pass EP expatriate MYXpats professional expat xpats gateway",s:["ESD Registration (one-time): RM 2,000-3,000.","EP Cat I (RM 10K+/mth): RM 3,000-5,000. EP Cat II (RM 5K-9,999): RM 2,000-3,500. EP Cat III (RM 3K-4,999): RM 1,500-2,500.","EP Renewal: RM 1,000-2,000. PVP (up to 12 months): RM 1,500-2,500.","Payment: 50% upfront, 50% on submission."],cost:"GOVT FEE (effective Sep 2024): EP application RM 2,000 + 6% SST = RM 2,120 (paid by employer). PVP RM 1,200 + SST = RM 1,272. Dependent Pass RM 500 + SST = RM 530. MERCY SKILLS SERVICE FEE: ESD Registration RM 2,000-3,000 | EP Cat I RM 3,000-5,000 | Cat II RM 2,000-3,500 | Cat III RM 1,500-2,500 | EP Renewal RM 1,000-2,000 | PVP RM 1,500-2,500.",warn:"CGC mandatory from 2026 — allow extra 2-4 weeks. EP fee increased from RM 800 to RM 2,000 effective Sep 2024.",pitch:"",hl:["Mercy Skills: 012-8999274"]},
{id:"B5",cat:"ms",q:"Mercy Skills — Local Malaysian Worker Recruitment",k:"local Malaysian tempatan recruitment placement staff hiring F&B restaurant mandarin chinese",s:["End-to-end Malaysian talent placement.","We advertise, screen, shortlist — you only meet top 3-5 candidates.","Target: F&B, manufacturing, retail, logistics. Joey speaks Mandarin — key advantage for Chinese restaurant outreach.","Fee: 1 month gross salary. No placement = no fee. 30-day free replacement guarantee."],cost:"Fee: 1 month gross salary. 50% retainer on agreement.",warn:"Retainer paid on signing regardless of outcome.",pitch:"",hl:["Mercy Skills: 012-8999274"]},
{id:"B6",cat:"shield",q:"MyShield — Migrant Worker Protection (RM 20/month)",k:"myshield protection migrant worker RM20 shield foreign worker rights abuse salary hotline",s:["Standalone protection membership for ALL migrant workers in Malaysia.","Flat RM 20/month — no hidden charges, no case fees.","Members get: Dedicated officer, salary disputes, passport recovery, abuse response, 24-hour SOS, document vault.","Join via Telegram. Hotline: +60199888720. Owned by Nikko Group Sdn Bhd."],cost:"RM 20/month flat. Annual: RM 200.",warn:"B2C — workers sign up and pay for themselves. NOT employer-sponsored.",pitch:"For less than the cost of a meal, workers get a personal officer who fights for their rights 24/7.",hl:["Telegram: +60199888720"]},
{id:"B7",cat:"wakil",q:"MyWakil — Career Protection for Malaysian Workers",k:"mywakil wakil career EPF Malaysian student employed job rights officer",s:["Malaysia first personal career agent platform for Malaysian workers.","3 tiers: Student (zero EPF) RM 10/month | Unemployed RM 17/month | Employed 1% of basic salary (min RM 17).","Members get: Dedicated officer, employer representation, job scouting, contract review, 2 free mental health sessions/year.","App build in progress. Under Mercy Skills Consultancy JTKSM 928."],cost:"Student: RM 10/month. Unemployed: RM 17/month. Employed: 1% of basic salary (min RM 17).",warn:"MyWakil is for Malaysian workers only. Foreign workers go to MyShield.",pitch:"When a Malaysian calls about job problems — MyWakil gives them a dedicated officer from RM 10/month.",hl:[]},

{id:"C1",cat:"fw",q:"Opening call script — Foreign Worker (English)",k:"script open english greet foreign worker call opening pitch call script",s:["Say: Good morning, may I speak with the person handling HR or workers?","Say: My name is [Name] from Mercy Skills Consultancy — licensed agency JTKSM 928.","Say: We specialise in legal foreign worker recruitment for Shah Alam and Klang area.","Ask: How many foreign workers does your company currently have?","Say: Are any permits expiring in the next 3-6 months? We handle all ePPAx, FOMEMA, and Immigration.","Close: May I send you our service list and fees on WhatsApp right now?"],cost:"",warn:"",pitch:"",hl:["WhatsApp: 012-8999274"]},
{id:"C2",cat:"fw",q:"Opening call script — Foreign Worker (BM)",k:"skrip BM bahasa melayu malay script pembuka opening call malay",s:["Cakap: Selamat pagi, boleh saya bercakap dengan tuan atau puan yang uruskan pekerja atau HR?","Cakap: Nama saya [Nama] dari Mercy Skills Consultancy — agensi berlesen JTKSM 928.","Tanya: Berapa ramai pekerja asing syarikat kini ada?","Cakap: Ada permit yang akan tamat dalam 3-6 bulan? Kami uruskan semua ePPAx, FOMEMA, dan Imigresen.","Tutup: Boleh saya hantarkan senarai perkhidmatan melalui WhatsApp sekarang?"],cost:"",warn:"",pitch:"",hl:["WhatsApp: 012-8999274"]},
{id:"C3",cat:"fw",q:"Opening call script — Mandarin (Chinese businesses)",k:"mandarin chinese script restaurant cina chinese call opening quota",s:["说: 你好，请问老板或负责人事的人在吗？","说: 我叫 [Name]，来自 Mercy Skills Consultancy，牌照 JTKSM 928。","问: 请问贵公司目前有多少名外劳？","说: 未来 3-6 个月有没有准证需要续期？我们负责所有 ePPAx、FOMEMA 及移民局事宜。","结尾: 我可以把服务清单发到您的 WhatsApp 吗？"],cost:"",warn:"",pitch:"",hl:["WhatsApp: 012-8999274"]},
{id:"C4",cat:"maid",q:"Maid placement pitch script",k:"maid pitch script domestic helper placement pembantu FDH indonesian philippine",s:["Say: Good morning, I am from Mercy Skills Consultancy — licensed maid agency JTKSM 928.","Ask: Are you looking for a domestic helper, or is your maid permit coming up for renewal?","Say: We supply Indonesian maids from RM 12,000 and Filipino from RM 16,000 — all documentation handled.","Say: Our contract includes a 3-6 month abscondment warranty.","Close: May I send you our maid services brochure on WhatsApp now?"],cost:"Indonesian: RM 12,000-15,000. Filipino: RM 16,000-18,000.",warn:"",pitch:"",hl:["WhatsApp: 012-8999274"]},
{id:"C5",cat:"renew",q:"Permit renewal pitch script",k:"renewal pitch permit renew baharui expiry script call",s:["Say: Hi [Name], quick check — are any permits expiring in the next 3 months?","Say: Late renewals mean fines of RM 5,000-30,000 per worker.","Say: From RM 400 per worker — we book FOMEMA, submit ePPAx, coordinate Immigration, return the sticker.","Close: Can I check your expiry dates right now and give you a quick quote?"],cost:"RM 400-600 per worker. Maid: RM 1,500-2,500.",warn:"",pitch:"",hl:["WhatsApp: 012-8999274"]},
{id:"C6",cat:"ep",q:"EP and ESD pitch script",k:"EP ESD employment pass script pitch expatriate professional",s:["Say: Good morning, I am from Mercy Skills — we handle ESD Employment Pass applications.","Ask: Do you have expatriate staff or plan to hire foreign professionals at RM 3,000+/month?","Say: We handle full ESD registration and EP application — you provide documents, we do everything.","Close: May I send our EP guide on WhatsApp now?"],cost:"ESD: RM 2,000-3,000. EP Cat I: RM 3,000-5,000. Cat II: RM 2,000-3,500. Cat III: RM 1,500-2,500.",warn:"",pitch:"",hl:["WhatsApp: 012-8999274"]},
{id:"C7",cat:"obj",q:"Objection: We manage our own workers",k:"objection manage own no need self handle we have agent already objection script",s:["Respond: That is great — many of our best clients manage their own team.","Say: Our most popular service is permit renewal — from RM 400/worker, your HR team is freed up.","Ask: Do you have all expiry dates tracked? We can do a free check right now."],cost:"",warn:"",pitch:"",hl:[]},
{id:"C8",cat:"obj",q:"Objection: Too expensive or no budget",k:"expensive mahal no budget costly too expensive price objection",s:["Respond: The government levy of RM 1,850 per worker per year is fixed regardless of who you use.","Say: Our service fee starts from just RM 400 per renewal.","Say: One late renewal fine is RM 5,000-30,000. That pays for 10+ years of our service."],cost:"",warn:"",pitch:"",hl:[]},
{id:"C9",cat:"obj",q:"Objection: Not the right time",k:"not now later nanti busy next time timing objection not interested",s:["Respond: Totally understand — when would be a better time?","Say: If any permits expire while we wait, fines start immediately on expiry date.","Offer: I can check expiry dates right now — 2 minutes, completely free."],cost:"",warn:"",pitch:"",hl:[]},
{id:"C10",cat:"obj",q:"Objection: Already have another agency",k:"other agency supplier competitor ada agent lain already have agent objection",s:["Respond: No problem — good that you are already working with someone.","Ask: Is your current agency JTKSM licensed? Just to make sure your company is legally protected.","Say: If you ever need a backup, Mercy Skills JTKSM 928 is always here.","Close: May I send our service comparison on WhatsApp? No commitment."],cost:"",warn:"",pitch:"",hl:[]}
]
